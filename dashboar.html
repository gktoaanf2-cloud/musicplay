<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair Music Box — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--c1:#fff;--c2:#ccc;--c3:#888;--c4:#030305;--hud:'Chakra Petch',sans-serif;--body:'Pretendard',sans-serif;}
body{background:var(--c4);color:var(--c1);font-family:var(--body);min-height:100vh;overflow-x:hidden;}
.bg-dust{position:fixed;inset:-50%;width:200%;height:200%;pointer-events:none;z-index:0;opacity:.5;background-image:radial-gradient(1.5px 1.5px at 20% 30%,rgba(255,255,255,1),transparent),radial-gradient(1px 1px at 55% 70%,rgba(255,255,255,.7),transparent),radial-gradient(1.5px 1.5px at 80% 20%,rgba(255,255,255,.8),transparent);background-size:500px 500px;animation:drift 90s linear infinite,twk 5s ease-in-out infinite alternate;}
@keyframes drift{0%{transform:translateY(0)}100%{transform:translateY(350px)}}
@keyframes twk{0%{opacity:.2}100%{opacity:.7}}
.bg-amb{position:fixed;border-radius:50%;filter:blur(120px);mix-blend-mode:screen;pointer-events:none;z-index:0;opacity:.04;}
.bg-amb.a{top:15%;left:10%;width:300px;height:300px;background:var(--c1);}
.bg-amb.b{bottom:10%;right:8%;width:350px;height:350px;background:var(--c2);}
.dash{display:flex;min-height:100vh;position:relative;z-index:1;}
.side{width:260px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:60px 20px 40px;position:sticky;top:0;height:100vh;}
.main{flex:1;padding:50px 40px 80px 60px;max-width:1100px;}
.prof-lp{width:120px;height:120px;border-radius:50%;position:relative;cursor:pointer;margin-bottom:20px;transition:.4s;}
.prof-lp:hover{transform:scale(1.04);}
.prof-lp:hover .prof-disc{animation:spin 4s linear infinite;}
.prof-lp:hover .prof-glow{opacity:1;}
.prof-disc{width:100%;height:100%;border-radius:50%;background:rgba(0,0,0,.6);box-shadow:inset 0 0 30px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.06);position:relative;overflow:hidden;transition:.4s;}
.prof-grooves{position:absolute;inset:0;border-radius:50%;background-image:repeating-radial-gradient(transparent 0,transparent 5px,rgba(255,255,255,.03) 5.5px,transparent 6px);pointer-events:none;}
.prof-img{position:absolute;top:50%;left:50%;width:54px;height:54px;border-radius:50%;transform:translate(-50%,-50%);background-size:cover;background-position:center;background-color:#111;z-index:2;}
.prof-glow{position:absolute;inset:-8px;border-radius:50%;box-shadow:0 0 24px 4px rgba(255,255,255,.12);opacity:0;transition:.5s;pointer-events:none;}
.prof-wave{position:absolute;inset:-12px;border-radius:50%;pointer-events:none;}
.prof-lp:hover .prof-wave::before,.prof-lp:hover .prof-wave::after{content:'';position:absolute;inset:0;border-radius:50%;border:1px solid var(--c1);animation:wv 2.5s ease-out infinite;opacity:0;}
.prof-lp:hover .prof-wave::after{animation-delay:1.2s;border-color:var(--c2);}
@keyframes wv{0%{transform:scale(1);opacity:.2}100%{transform:scale(1.6);opacity:0}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.prof-name{text-align:center;margin-bottom:4px;}
.prof-name small{display:block;font-size:8.5px;color:var(--c1);opacity:.5;margin-bottom:3px;}
.prof-name b{font-size:15px;font-weight:600;position:relative;cursor:default;}
.prof-name b::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:.5px;background:var(--c1);transition:.4s;}
.prof-name b:hover::after{width:100%;}
.prof-nav{margin-top:auto;display:flex;flex-direction:column;gap:8px;align-items:center;}
.prof-nav .diamond-nav{width:14px;height:14px;position:relative;margin-bottom:12px;}
.prof-nav .diamond-nav span{position:absolute;width:3px;height:3px;background:var(--c1);transform:rotate(45deg);}
.prof-nav .diamond-nav span:nth-child(1){top:0;left:5.5px;}.prof-nav .diamond-nav span:nth-child(2){top:5.5px;left:11px;}.prof-nav .diamond-nav span:nth-child(3){top:11px;left:5.5px;}.prof-nav .diamond-nav span:nth-child(4){top:5.5px;left:0;}
.nav-btn{background:none;border:none;color:var(--c3);font-family:var(--hud);font-size:10px;font-weight:600;letter-spacing:3px;cursor:pointer;transition:.3s;text-transform:uppercase;padding:4px 0;}
.nav-btn:hover{color:var(--c1);text-shadow:0 0 10px rgba(255,255,255,.3);}
.nav-btn.logout:hover{color:#f06;}
.sec{margin-bottom:50px;}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.sec-ix{font-family:var(--hud);font-size:10px;letter-spacing:2px;color:var(--c1);opacity:.6;}
.sec-title{font-family:var(--hud);font-size:12px;font-weight:700;letter-spacing:4px;color:var(--c3);text-transform:uppercase;}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.12),transparent);}
.sec-dot{width:5px;height:5px;background:var(--c3);transform:rotate(45deg);opacity:.5;}
.view-tog{background:none;border:1px solid rgba(255,255,255,.1);color:var(--c3);font-family:var(--hud);font-size:8px;font-weight:600;letter-spacing:2px;padding:5px 10px;cursor:pointer;transition:.3s;text-transform:uppercase;margin-left:8px;}
.view-tog:hover{color:var(--c1);border-color:rgba(255,255,255,.3);}
.lp-grid{display:flex;flex-wrap:wrap;gap:40px 50px;padding:10px 0;}
.lp-card{display:flex;flex-direction:column;align-items:center;width:210px;cursor:pointer;transition:.3s;}
.lp-card:hover .lpc-disc{animation:spin 6s linear infinite;}
.lp-card:hover .lpc-wave::before,.lp-card:hover .lpc-wave::after{content:'';position:absolute;inset:0;border-radius:50%;border:1px solid var(--c1);animation:wv 3s ease-out infinite;opacity:0;}
.lp-card:hover .lpc-wave::after{animation-delay:1.5s;border-color:var(--c2);}
.lpc-wrap{width:192px;height:192px;position:relative;margin-bottom:16px;}
.lpc-disc{width:100%;height:100%;border-radius:50%;background:rgba(0,0,0,.6);box-shadow:inset 0 0 50px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.05);position:relative;overflow:hidden;transition:.4s;}
.lpc-grooves{position:absolute;inset:0;border-radius:50%;background-image:repeating-radial-gradient(transparent 0,transparent 8px,rgba(255,255,255,.03) 8.5px,transparent 9px);pointer-events:none;}
.lpc-center{position:absolute;top:50%;left:50%;width:86px;height:86px;border-radius:50%;transform:translate(-50%,-50%);background-size:cover;background-position:center;background-color:#080808;z-index:2;box-shadow:inset 0 0 20px rgba(0,0,0,.8);}
.lpc-wave{position:absolute;inset:-16px;border-radius:50%;pointer-events:none;}
.lpc-glow{position:absolute;inset:-4px;border-radius:50%;box-shadow:0 0 20px 2px rgba(255,255,255,.08);opacity:0;transition:.5s;pointer-events:none;}
.lp-card:hover .lpc-glow{opacity:1;}
.lpc-info{text-align:center;width:100%;}
.lpc-diamond{width:3px;height:3px;background:var(--c1);transform:rotate(45deg);margin:0 auto 8px;opacity:.3;transition:.5s;}
.lp-card:hover .lpc-diamond{opacity:1;animation:dspin 2s linear infinite;box-shadow:0 0 6px var(--c1);}
@keyframes dspin{from{transform:rotate(45deg)}to{transform:rotate(405deg)}}
.lpc-title{font-size:12.5px;font-weight:500;letter-spacing:-.02em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;position:relative;}
.lpc-title::after{content:'';position:absolute;bottom:-2px;left:50%;width:0;height:.5px;background:var(--c1);transition:.4s;transform:translateX(-50%);}
.lp-card:hover .lpc-title::after{width:80%;}
.lpc-sub{font-family:var(--hud);font-size:8.5px;color:var(--c3);letter-spacing:1px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.lpc-date{font-family:var(--hud);font-size:9.5px;color:var(--c3);letter-spacing:1px;opacity:.6;margin-bottom:8px;}
.lpc-acts{display:flex;gap:6px;justify-content:center;opacity:0;transition:.3s;transform:translateY(4px);}
.lp-card:hover .lpc-acts{opacity:.6;transform:none;}
.act-btn{background:none;border:none;color:var(--c3);font-family:var(--hud);font-size:8.5px;font-weight:700;letter-spacing:2.5px;cursor:pointer;transition:.3s;text-transform:uppercase;padding:4px 8px;}
.act-btn:hover{color:var(--c1);}.act-btn.del:hover{color:#f06;}
.new-card{display:flex;align-items:center;justify-content:center;width:210px;height:260px;border:1px dashed rgba(255,255,255,.08);cursor:pointer;transition:.4s;flex-direction:column;gap:6px;}
.new-card:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.01);}
.new-card span{font-family:var(--hud);font-size:10px;font-weight:600;letter-spacing:4px;color:var(--c3);transition:.3s;}
.new-card:hover span{color:var(--c1);}.new-plus{font-size:20px;font-weight:200;color:var(--c3);transition:.3s;}.new-card:hover .new-plus{color:var(--c1);}
.fav-grid{display:flex;flex-wrap:wrap;gap:28px;}
.fav-card{display:flex;flex-direction:column;align-items:center;width:140px;cursor:pointer;transition:.3s;position:relative;}
.fav-card:hover .fav-disc{animation:spin 5s linear infinite;}
.fav-card:hover .fav-wave::before{content:'';position:absolute;inset:0;border-radius:50%;border:1px solid var(--c1);animation:wv 2.5s ease-out infinite;opacity:0;}
.fav-wrap{width:92px;height:92px;position:relative;margin-bottom:8px;}
.fav-bg{position:absolute;inset:-6px;background:#383838;z-index:0;overflow:hidden;}
.fav-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.3;filter:blur(1px);}
.fav-bg-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.5),rgba(0,0,0,.3));}
.fav-disc{width:100%;height:100%;border-radius:50%;background:rgba(0,0,0,.6);box-shadow:inset 0 0 25px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.05);position:relative;overflow:hidden;z-index:1;transition:.4s;}
.fav-grooves{position:absolute;inset:0;border-radius:50%;background-image:repeating-radial-gradient(transparent 0,transparent 4px,rgba(255,255,255,.03) 4.5px,transparent 5px);pointer-events:none;}
.fav-center{position:absolute;top:50%;left:50%;width:42px;height:42px;border-radius:50%;transform:translate(-50%,-50%);background-size:cover;background-position:center;background-color:#080808;z-index:2;}
.fav-wave{position:absolute;inset:-8px;border-radius:50%;pointer-events:none;z-index:2;}
.fav-info{text-align:center;width:100%;}
.fav-diamond{width:2.5px;height:2.5px;background:var(--c1);transform:rotate(45deg);margin:0 auto 5px;opacity:.3;}
.fav-card:hover .fav-diamond{opacity:1;animation:dspin 2s linear infinite;}
.fav-by{font-family:var(--hud);font-size:5.7px;color:var(--c3);letter-spacing:2px;margin-bottom:3px;}
.fav-title{font-size:8.6px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.fav-sub{font-family:var(--hud);font-size:4.2px;color:var(--c3);letter-spacing:1px;}
.fav-remove{position:absolute;top:4px;right:4px;background:none;border:none;color:var(--c3);font-size:10px;cursor:pointer;opacity:0;transition:.3s;z-index:5;}
.fav-card:hover .fav-remove{opacity:.5;}.fav-remove:hover{opacity:1!important;color:#f06;}
.list-view{display:none;flex-direction:column;gap:4px;}
.list-row{display:flex;align-items:center;padding:14px 16px;transition:.4s;cursor:pointer;position:relative;}
.list-row::after{content:'';position:absolute;bottom:0;left:0;width:0;height:.5px;background:var(--c1);transition:.6s;opacity:.3;}
.list-row:hover{background:rgba(255,255,255,.015);}.list-row:hover::after{width:100%;}
.list-row:hover .lpc-diamond{opacity:1;animation:dspin 2s linear infinite;box-shadow:0 0 6px var(--c1);}
.list-row .lpc-diamond{margin:0 16px 0 0;}.list-row .lpc-title{font-size:13px;text-align:left;flex:1;max-width:none;}.list-row .lpc-title::after{display:none;}
.list-row .lpc-date{margin:0 16px 0 auto;font-size:10px;}.list-row .lpc-acts{opacity:0;margin:0;}.list-row:hover .lpc-acts{opacity:.6;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:10000;justify-content:center;align-items:center;opacity:0;transition:.3s;}
.modal-bg.show{display:flex;opacity:1;}
.modal{background:linear-gradient(135deg,rgba(15,15,20,.95),rgba(5,5,10,.9));border:1px solid rgba(255,255,255,.08);padding:36px 32px;width:380px;max-width:90vw;position:relative;text-align:center;}
.modal::before{content:'';position:absolute;top:-1px;left:-1px;width:12px;height:12px;border-top:1px solid rgba(255,255,255,.25);border-left:1px solid rgba(255,255,255,.25);}
.modal-title{font-family:var(--hud);font-size:11px;font-weight:600;letter-spacing:4px;color:var(--c3);margin-bottom:24px;}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--c3);font-size:14px;cursor:pointer;transition:.3s;padding:4px;}.modal-close:hover{color:var(--c1);}
.modal .upl-btn{display:block;width:100%;padding:14px;background:none;border:1px solid rgba(255,255,255,.12);color:var(--c1);font-family:var(--hud);font-size:10px;font-weight:600;letter-spacing:3px;cursor:pointer;transition:.3s;margin-bottom:12px;text-transform:uppercase;}.modal .upl-btn:hover{border-color:var(--c1);background:rgba(255,255,255,.03);}
.modal .url-sep{font-size:9px;color:var(--c3);margin:12px 0;letter-spacing:3px;font-family:var(--hud);}
.modal .url-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:var(--c1);font-size:12px;padding:10px 0;outline:none;font-family:var(--body);transition:.3s;}.modal .url-input:focus{border-color:var(--c1);}
.modal .url-save{margin-top:16px;background:none;border:1px solid rgba(255,255,255,.2);color:var(--c1);font-family:var(--hud);font-size:10px;font-weight:600;letter-spacing:3px;padding:10px 28px;cursor:pointer;transition:.3s;}.modal .url-save:hover{border-color:var(--c1);}
.dash-footer{text-align:center;padding:30px 0;margin-top:40px;border-top:1px solid rgba(255,255,255,.03);}
.dash-footer span{font-family:var(--hud);font-size:10px;color:var(--c3);letter-spacing:3px;opacity:.4;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);color:var(--c1);font-family:var(--hud);font-size:11px;letter-spacing:2px;padding:14px 28px;opacity:0;transition:.4s;z-index:99999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="bg-dust"></div><div class="bg-amb a"></div><div class="bg-amb b"></div>
<div class="dash">
  <aside class="side">
    <div class="prof-lp" onclick="openAvatarModal()"><div class="prof-disc"><div class="prof-grooves"></div><div class="prof-img" id="prof-img"></div></div><div class="prof-glow"></div><div class="prof-wave"></div></div>
    <div class="prof-name"><small>Welcome</small><b id="nick-display">...</b></div>
    <nav class="prof-nav"><div class="diamond-nav"><span></span><span></span><span></span><span></span></div><button class="nav-btn" onclick="loadData()">Refresh</button><button class="nav-btn logout" onclick="doLogout()">Logout</button></nav>
  </aside>
  <main class="main">
    <section class="sec"><div class="sec-head"><span class="sec-ix">01</span><span class="sec-title">My Playlists</span><button class="view-tog" id="tog-pl" onclick="toggleView('pl')">LIST</button><div class="sec-line"></div><div class="sec-dot"></div></div><div class="lp-grid" id="pl-album"></div><div class="list-view" id="pl-list"></div></section>
    <section class="sec"><div class="sec-head"><span class="sec-ix">02</span><span class="sec-title">Favorites</span><button class="view-tog" id="tog-fav" onclick="toggleView('fav')">LIST</button><div class="sec-line"></div><div class="sec-dot"></div></div><div class="fav-grid" id="fav-album"></div><div class="list-view" id="fav-list"></div></section>
    <footer class="dash-footer"><span>PAIR MUSIC BOX — COSMIC ARCHIVE</span></footer>
  </main>
</div>
<div class="modal-bg" id="avatar-modal"><div class="modal"><button class="modal-close" onclick="closeAvatarModal()">✕</button><div class="modal-title">PROFILE IMAGE</div><button class="upl-btn" onclick="document.getElementById('avatar-file').click()">이미지 업로드</button><div class="url-sep">— OR —</div><input class="url-input" id="avatar-url-input" type="text" placeholder="이미지 URL 붙여넣기"><button class="url-save" onclick="saveAvatarUrl()">적용</button></div></div>
<input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script>
var currentUser=null,currentProfile=null,plView='album',favView='album';
function fmtDate(d){if(!d)return'';var dt=new Date(d);return dt.getFullYear()+'.'+String(dt.getMonth()+1).padStart(2,'0')+'.'+String(dt.getDate()).padStart(2,'0');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function escHtml(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
async function doLogout(){await _supabase.auth.signOut();window.location.href='index.html';}
function toggleView(sec){if(sec==='pl'){plView=plView==='album'?'list':'album';document.getElementById('pl-album').style.display=plView==='album'?'flex':'none';document.getElementById('pl-list').style.display=plView==='list'?'flex':'none';document.getElementById('tog-pl').textContent=plView==='album'?'LIST':'ALBUM';}else{favView=favView==='album'?'list':'album';document.getElementById('fav-album').style.display=favView==='album'?'flex':'none';document.getElementById('fav-list').style.display=favView==='list'?'flex':'none';document.getElementById('tog-fav').textContent=favView==='album'?'LIST':'ALBUM';}}
function openAvatarModal(){document.getElementById('avatar-modal').classList.add('show');}
function closeAvatarModal(){document.getElementById('avatar-modal').classList.remove('show');}
async function uploadAvatar(e){var f=e.target.files[0];if(!f||!currentUser)return;var ext=f.name.split('.').pop();var r=await _supabase.storage.from('covers').upload('avatars/'+currentUser.id+'.'+ext,f,{upsert:true});if(!r.error){var url=_supabase.storage.from('covers').getPublicUrl('avatars/'+currentUser.id+'.'+ext).data.publicUrl;await _supabase.from('profiles').update({avatar_url:url}).eq('id',currentUser.id);document.getElementById('prof-img').style.backgroundImage='url('+url+')';closeAvatarModal();toast('프로필 사진 업데이트!');}e.target.value='';}
async function saveAvatarUrl(){var url=document.getElementById('avatar-url-input').value.trim();if(!url||!currentUser)return;await _supabase.from('profiles').update({avatar_url:url}).eq('id',currentUser.id);document.getElementById('prof-img').style.backgroundImage='url('+url+')';closeAvatarModal();toast('프로필 사진 업데이트!');}
function copyShare(id){var url=window.location.origin+window.location.pathname.replace(/\/[^\/]*$/,'/')+'viewer.html?id='+id;navigator.clipboard.writeText(url).then(function(){toast('공유 링크 복사!');}).catch(function(){prompt('링크:',url);});}
async function deletePl(id,name){if(!confirm('"'+name+'" 삭제?\n(복원 불가)'))return;await _supabase.from('playlists').delete().eq('id',id);toast('삭제 완료');loadData();}
async function removeFav(favId){await _supabase.from('favorites').delete().eq('id',favId);toast('즐겨찾기 해제');loadData();}
async function createPl(){if(!currentUser)return;var r=await _supabase.from('playlists').insert({user_id:currentUser.id,pair_name:'NEW PLAYLIST',sub_title:'RECORD OF OUR GALAXY'}).select('id').single();if(!r.error){toast('새 플레이리스트!');loadData();}}
async function loadData(){if(!currentUser)return;
var plR=await _supabase.from('playlists').select('id,pair_name,sub_title,cover_image_url,updated_at,color_1,color_5').eq('user_id',currentUser.id).order('updated_at',{ascending:false});var pls=plR.data||[];
var ah='';pls.forEach(function(pl){var img=pl.cover_image_url?'background-image:url('+pl.cover_image_url+')':'';var tc=pl.color_5||pl.color_1||'#fff';ah+='<div class="lp-card" onclick="location.href=\'editor.html?id='+pl.id+'\'"><div class="lpc-wrap"><div class="lpc-disc" style="box-shadow:inset 0 0 50px rgba(0,0,0,.9),0 0 0 1px '+tc+'11"><div class="lpc-grooves"></div><div class="lpc-center" style="'+img+'"></div></div><div class="lpc-glow" style="box-shadow:0 0 20px 2px '+tc+'22"></div><div class="lpc-wave"></div></div><div class="lpc-info"><div class="lpc-diamond"></div><div class="lpc-title">'+escHtml(pl.pair_name)+'</div><div class="lpc-sub">'+escHtml(pl.sub_title)+'</div><div class="lpc-date">'+fmtDate(pl.updated_at)+'</div><div class="lpc-acts"><button class="act-btn" onclick="event.stopPropagation();copyShare(\''+pl.id+'\')">SHARE</button><button class="act-btn del" onclick="event.stopPropagation();deletePl(\''+pl.id+'\',\''+escHtml(pl.pair_name).replace(/'/g,"\\'")+'\')">DEL</button></div></div></div>';});
ah+='<div class="new-card" onclick="createPl()"><div class="new-plus">+</div><span>NEW PLAYLIST</span></div>';document.getElementById('pl-album').innerHTML=ah;
var lh='';pls.forEach(function(pl){lh+='<div class="list-row" onclick="location.href=\'editor.html?id='+pl.id+'\'"><div class="lpc-diamond"></div><div class="lpc-title">'+escHtml(pl.pair_name)+' <span style="color:var(--c3);font-weight:300;font-size:11px;margin-left:8px;">'+escHtml(pl.sub_title)+'</span></div><div class="lpc-date">'+fmtDate(pl.updated_at)+'</div><div class="lpc-acts"><button class="act-btn" onclick="event.stopPropagation();copyShare(\''+pl.id+'\')">SHARE</button><button class="act-btn del" onclick="event.stopPropagation();deletePl(\''+pl.id+'\',\''+escHtml(pl.pair_name).replace(/'/g,"\\'")+'\')">DEL</button></div></div>';});document.getElementById('pl-list').innerHTML=lh;
var favR=await _supabase.from('favorites').select('id,playlist_id,playlists(id,pair_name,sub_title,cover_image_url,user_id,profiles(nickname,avatar_url))').eq('user_id',currentUser.id).order('created_at',{ascending:false});var favs=favR.data||[];
var fa='',fl='';favs.forEach(function(f){var pl=f.playlists;if(!pl)return;var ow=pl.profiles?pl.profiles.nickname:'?';var oa=pl.profiles&&pl.profiles.avatar_url?pl.profiles.avatar_url:'';var img=pl.cover_image_url?'background-image:url('+pl.cover_image_url+')':'';
fa+='<div class="fav-card" onclick="location.href=\'viewer.html?id='+pl.id+'\'"><div class="fav-wrap"><div class="fav-bg">'+(oa?'<div class="fav-bg-img" style="background-image:url('+oa+')"></div>':'')+'<div class="fav-bg-overlay"></div></div><div class="fav-disc"><div class="fav-grooves"></div><div class="fav-center" style="'+img+'"></div></div><div class="fav-wave"></div></div><div class="fav-info"><div class="fav-diamond"></div><div class="fav-by">BY '+escHtml(ow)+'</div><div class="fav-title">'+escHtml(pl.pair_name)+'</div><div class="fav-sub">'+escHtml(pl.sub_title)+'</div></div><button class="fav-remove" onclick="event.stopPropagation();removeFav(\''+f.id+'\')">✕</button></div>';
fl+='<div class="list-row" onclick="location.href=\'viewer.html?id='+pl.id+'\'"><div class="lpc-diamond"></div><div class="lpc-title"><span style="color:var(--c3);font-size:10px;letter-spacing:2px;margin-right:12px;font-family:var(--hud);">BY '+escHtml(ow)+'</span>'+escHtml(pl.pair_name)+'</div><div class="lpc-acts"><button class="act-btn del" onclick="event.stopPropagation();removeFav(\''+f.id+'\')">✕</button></div></div>';});
if(!favs.length){fa='<div style="padding:30px;color:var(--c3);font-size:11px;letter-spacing:2px;font-family:var(--hud);opacity:.4;">즐겨찾기가 없습니다</div>';fl=fa;}
document.getElementById('fav-album').innerHTML=fa;document.getElementById('fav-list').innerHTML=fl;}
async function init(){currentUser=await requireAuth();if(!currentUser)return;currentProfile=await getProfile(currentUser.id);document.getElementById('nick-display').textContent=currentProfile?currentProfile.nickname:'유저';if(currentProfile&&currentProfile.avatar_url)document.getElementById('prof-img').style.backgroundImage='url('+currentProfile.avatar_url+')';loadData();}
window.addEventListener('pageshow',function(e){if(e.persisted)loadData();});
init();
</script>
</body>
</html>
