<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pair Music Box - Ultimate Narrative</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style id="core-styles">
        /* =========================================
           1. CORE DESIGN SYSTEM 
           ========================================= */
        :root {
            --color-1: #00f0ff;
            --color-2: #ff007f;
            --color-3: #7000ff;
            --color-4: #050508;
            --font-pair: 'Pretendard', sans-serif; 
        }

        body {
            background-color: var(--color-4);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-weight: 300;
            transition: background-color 0.5s ease;
        }

        .ambient-background {
            position: absolute; inset: 0; overflow: hidden; z-index: -1; 
            background: var(--color-4);
        }
        .ambient-blob {
            position: absolute; filter: blur(150px); opacity: 0.35; border-radius: 50%;
            animation: float 12s ease-in-out infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--color-1); }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: var(--color-2); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: var(--color-3); animation-delay: -2s; }

        @keyframes float { 100% { transform: translate(3%, 3%) scale(1.1); } }

        /* =========================================
           2. EXPORT TARGET
           ========================================= */
        #export-target {
            width: 1400px; height: 850px; display: flex; flex-direction: column;
            position: relative; box-sizing: border-box; padding: 50px 60px;
        }

        .main-content { display: flex; flex: 1; gap: 120px; align-items: center; }

        /* =========================================
           3. TOOLS & UI (에디팅용 - 뷰어 버전에선 삭제됨)
           ========================================= */
        .floating-tools {
            position: absolute; top: 40px; right: 50px; display: flex; gap: 15px; align-items: center; z-index: 100;
        }
        .text-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.5); font-size: 13px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); font-family: inherit;
            text-transform: uppercase; letter-spacing: 2px; padding: 5px; font-weight: 600;
        }
        .text-btn:hover { color: #fff; text-shadow: 0 0 15px var(--color-1), 0 0 30px var(--color-2); transform: translateY(-1px); }

        .color-picker-wrapper {
            position: relative; width: 14px; height: 14px; border-radius: 50%; overflow: hidden;
            box-shadow: 0 0 10px rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s;
        }
        .color-picker-wrapper:hover { transform: scale(1.4); box-shadow: 0 0 15px #fff; z-index: 10; }
        .color-picker-wrapper input[type="color"] {
            position: absolute; top: -10px; left: -10px; width: 40px; height: 40px; cursor: pointer; border: none;
        }
        .font-controls, .color-controls { display: flex; gap: 10px; border-right: 1px solid rgba(255,255,255,0.15); padding-right: 15px; align-items: center;}

        /* =========================================
           4. HOLOGRAPHIC LP (혼신의 애니메이션 복구)
           ========================================= */
        .lp-wrapper { flex: 0 0 650px; display: flex; justify-content: center; align-items: center; position: relative; }

        .lp-spin-master {
            width: 660px; height: 660px; display: flex; justify-content: center; align-items: center; position: relative;
            animation: master-spin 10s linear infinite; animation-play-state: paused;
        }

        /* [수정 완] 확실하게 보이는 외곽선 헤일로 빛무리 (블렌드 모드 제거) */
        .lp-halo-ring {
            position: absolute; inset: 0px; border-radius: 50%;
            background: conic-gradient(from 0deg, var(--color-1), transparent 20%, var(--color-2) 40%, transparent 60%, var(--color-3) 80%, var(--color-1));
            opacity: 0.75; filter: blur(12px); z-index: 0;
            box-shadow: 0 0 30px var(--color-1), inset 0 0 20px var(--color-2);
        }

        .lp-record {
            width: 650px; height: 650px; border-radius: 50%;
            background: var(--color-4); position: relative; box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 1;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .lp-grooves {
            position: absolute; inset: 0; border-radius: 50%;
            background-image: repeating-radial-gradient(transparent 0, transparent 12px, rgba(255,255,255,0.06) 13px, rgba(255,255,255,0.1) 14px, transparent 15px);
            pointer-events: none; z-index: 2;
        }

        /* [수정 완] 그루브 안에서 확실하게 도는 내부 홀로그램 효과 */
        .lp-internal-glow {
            position: absolute; inset: -20px; border-radius: 50%;
            background: conic-gradient(from 90deg, transparent 0%, rgba(255,255,255,0.15) 25%, transparent 50%, rgba(255,255,255,0.15) 75%, transparent 100%);
            opacity: 0.8; pointer-events: none; z-index: 3; filter: blur(4px);
        }

        @keyframes master-spin { 100% { transform: rotate(360deg); } }

        .lp-center-image {
            width: 280px; height: 280px; border-radius: 50%; background-color: var(--color-4);
            background-size: cover; background-position: center; position: relative; z-index: 10;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 0 50px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.9);
            cursor: pointer; transition: 0.5s; background-image: url('https://via.placeholder.com/300?text=UPLOAD');
        }
        .lp-center-image:hover { box-shadow: 0 0 0 2px #fff, 0 0 70px var(--color-1); transform: scale(1.02); }

        /* =========================================
           5. PLAYLIST
           ========================================= */
        .playlist-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; height: 100%; }

        .pair-name {
            font-family: var(--font-pair); font-size: 68px; font-weight: 700;
            background: linear-gradient(135deg, var(--color-1), var(--color-2), var(--color-3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; margin-bottom: 50px; outline: none; display: inline-block;
            transition: font-size 0.2s; text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .playlist-container { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .playlist-container::-webkit-scrollbar { display: none; }

        .track-item {
            display: flex; align-items: center; padding: 16px 20px; background: transparent;
            cursor: pointer; font-size: 15px; color: rgba(255,255,255,0.4); position: relative; transition: color 0.4s; font-weight: 400;
        }
        .track-item::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 1px;
            background: linear-gradient(90deg, var(--color-1), var(--color-3));
            box-shadow: 0 0 10px var(--color-1), 0 0 20px var(--color-3); transition: width 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .track-item:hover { color: #fff; }
        .track-item:hover::after { width: 100%; }
        .track-item.playing { color: #fff; font-weight: 600; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .track-item.playing::after { width: 100%; opacity: 0.6; }

        .diamond-mark { width: 6px; height: 6px; background: #fff; transform: rotate(45deg); margin-right: 25px; opacity: 0.15; transition: 0.5s; }
        .track-item:hover .diamond-mark { opacity: 1; background: var(--color-1); box-shadow: 0 0 12px var(--color-1); }
        .track-item.playing .diamond-mark { opacity: 1; background: var(--color-2); box-shadow: 0 0 15px var(--color-2); }

        /* =========================================
           6. ULTRA-SLIM SOUNDBAR
           ========================================= */
        .player-bar { width: 100%; height: 60px; display: flex; align-items: center; margin-top: 80px; }
        .controls { display: flex; align-items: center; gap: 40px; }
        .control-btn { background: none; border: none; cursor: pointer; padding: 0; opacity: 0.4; transition: 0.4s; }
        .control-btn:hover { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 12px var(--color-2)); }
        .control-btn svg { width: 20px; height: 20px; fill: #fff; }
        .play-pause-btn svg { width: 34px; height: 34px; fill: url(#grad-play); }

        .progress-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; margin: 0 70px; gap: 16px; }
        .track-meta { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 2px; }
        #current-track-name { font-weight: 600; font-size: 14px; color: #fff; letter-spacing: 1px; }

        /* 1px 초극세사 라인 복구 */
        .progress-bar-container { width: 100%; height: 1px; background: rgba(255,255,255,0.1); cursor: pointer; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--color-1), var(--color-2), var(--color-3)); box-shadow: 0 0 10px var(--color-2); position: relative; transition: width 0.1s linear; }
        .progress-fill::after { content: ''; position: absolute; right: -3px; top: -3px; width: 6px; height: 6px; background: #fff; transform: rotate(45deg); box-shadow: 0 0 12px #fff, 0 0 20px var(--color-1); }

        .add-form { display: flex; gap: 20px; align-items: center; }
        .add-form input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 0; font-size: 13px; width: 120px; outline: none; transition: 0.4s; font-family: inherit; }
        .add-form input:focus { border-bottom-color: var(--color-3); }
    </style>
</head>
<body>
    <svg width="0" height="0">
        <defs>
            <linearGradient id="grad-play" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--color-1)" />
                <stop offset="50%" style="stop-color:var(--color-2)" />
                <stop offset="100%" style="stop-color:var(--color-3)" />
            </linearGradient>
        </defs>
    </svg>

    <div class="ambient-background" data-html2canvas-ignore="true">
        <div class="ambient-blob blob-1"></div><div class="ambient-blob blob-2"></div><div class="ambient-blob blob-3"></div>
    </div>

    <div id="export-target">
        
        <!-- 에디팅 툴바 -->
        <div class="floating-tools" data-html2canvas-ignore="true" id="editor-tools">
            <div class="font-controls">
                <button class="text-btn" id="font-size-down">A-</button>
                <button class="text-btn" id="font-size-up">A+</button>
                <button class="text-btn" id="font-toggle-btn">FONT</button>
            </div>
            
            <div class="color-controls">
                <div class="color-picker-wrapper"><input type="color" id="config-color-1" value="#00f0ff"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-2" value="#ff007f"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-3" value="#7000ff"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-4" value="#050508"></div>
            </div>
            
            <button class="text-btn" id="save-local-btn">SAVE</button>
            <button class="text-btn" id="export-png-btn">IMG</button>
            <!-- 대망의 감상용 HTML 내보내기 버튼 -->
            <button class="text-btn" id="export-html-btn" style="color: var(--color-1);">HTML SHARE</button>
        </div>

        <div class="main-content">
            <div class="lp-wrapper">
                <div class="lp-spin-master" id="lp-master">
                    <div class="lp-halo-ring"></div>
                    <div class="lp-record">
                        <div class="lp-grooves"></div>
                        <div class="lp-internal-glow"></div>
                        <!-- 뷰어 모드에선 업로드 클릭 방지 속성 부여 예정 -->
                        <div class="lp-center-image" id="center-img" onclick="document.getElementById('config-file').click()"></div>
                    </div>
                </div>
            </div>

            <div class="playlist-wrapper">
                <div class="pair-name" id="pair-name-display" contenteditable="true" spellcheck="false">ETERNAL_BOND</div>
                <ul class="playlist-container" id="playlist"></ul>
            </div>
        </div>

        <div class="player-bar">
            <div class="controls">
                <button class="control-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="control-btn play-pause-btn" id="btn-play-pause">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>

            <div class="progress-wrapper">
                <div class="track-meta">
                    <span id="current-track-name">NO TRACK SELECTED</span>
                    <span id="time-display">0:00 / 0:00</span>
                </div>
                <div class="progress-bar-container" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="add-form" data-html2canvas-ignore="true" id="add-track-form">
                <input type="text" id="yt-url" placeholder="YouTube URL">
                <input type="text" id="yt-title" placeholder="Track Title">
                <button class="text-btn" id="add-track-btn">ADD</button>
            </div>
        </div>
    </div>

    <input type="file" id="config-file" accept="image/*" style="display: none;">
    <div id="youtube-player" style="display:none; position:absolute;"></div>

    <script id="core-logic">
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player, progressInterval;
        let playlistData = [];
        let currentPlayingIndex = -1;
        let isPlaying = false;
        let base64ImgData = "https://via.placeholder.com/300?text=UPLOAD";
        let currentFontSize = 68;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', { height: '0', width: '0', events: { 'onStateChange': onPlayerStateChange } });
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startProgressBar() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (player && isPlaying && player.getCurrentTime) {
                    const current = player.getCurrentTime();
                    const duration = player.getDuration();
                    if(duration > 0) {
                        document.getElementById('progress-fill').style.width = (current / duration) * 100 + '%';
                        document.getElementById('time-display').textContent = `${formatTime(current)} / ${formatTime(duration)}`;
                    }
                }
            }, 200);
        }

        function onPlayerStateChange(event) {
            const lpMaster = document.getElementById('lp-master');
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                lpMaster.style.animationPlayState = 'running';
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                startProgressBar();
            } else {
                isPlaying = false;
                lpMaster.style.animationPlayState = 'paused';
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                clearInterval(progressInterval);
            }
            if (event.data === YT.PlayerState.ENDED) playNextTrack();
        }

        document.getElementById('progress-bar').addEventListener('click', (e) => {
            if (player && player.getDuration) {
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                player.seekTo(player.getDuration() * percent, true);
                document.getElementById('progress-fill').style.width = (percent * 100) + '%';
            }
        });

        // 뷰어 모드에서도 플레이리스트 재생을 위한 이벤트 위임
        document.getElementById('playlist').addEventListener('click', (e) => {
            const trackItem = e.target.closest('.track-item');
            if(trackItem) {
                const index = Array.from(trackItem.parentNode.children).indexOf(trackItem);
                playTrack(index);
            }
        });

        function playTrack(index) {
            if (index < 0 || index >= playlistData.length) return;
            currentPlayingIndex = index;
            player.loadVideoById(playlistData[index].videoId);
            document.getElementById('current-track-name').textContent = playlistData[index].title;
            renderPlaylistUI();
        }

        function renderPlaylistUI() {
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, idx) => {
                if(idx === currentPlayingIndex) item.classList.add('playing');
                else item.classList.remove('playing');
            });
        }

        function playNextTrack() { playTrack(currentPlayingIndex + 1 >= playlistData.length ? 0 : currentPlayingIndex + 1); }
        function playPrevTrack() { playTrack(currentPlayingIndex - 1 < 0 ? playlistData.length - 1 : currentPlayingIndex - 1); }

        document.getElementById('btn-play-pause').addEventListener('click', () => {
            if(currentPlayingIndex === -1 && playlistData.length > 0) playTrack(0);
            else if (player && player.getPlayerState) isPlaying ? player.pauseVideo() : player.playVideo();
        });
        document.getElementById('btn-next').addEventListener('click', playNextTrack);
        document.getElementById('btn-prev').addEventListener('click', playPrevTrack);
    </script>

    <!-- [에디터 전용 로직] 감상용 HTML에선 포함되지 않음 -->
    <script id="editor-logic">
        function extractVideoID(url) {
            const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        document.getElementById('add-track-btn').addEventListener('click', () => {
            const videoId = extractVideoID(document.getElementById('yt-url').value);
            const title = document.getElementById('yt-title').value.trim() || "UNKNOWN TRACK";
            if (!videoId) return alert("유효한 유튜브 링크가 아닙니다.");
            playlistData.push({ videoId, title });
            document.getElementById('yt-url').value = ''; document.getElementById('yt-title').value = '';
            
            const li = document.createElement('li');
            li.className = 'track-item';
            li.innerHTML = `<div class="diamond-mark"></div><span>${String(playlistData.length).padStart(2, '0')} &nbsp;&nbsp;&nbsp; ${title}</span>`;
            document.getElementById('playlist').appendChild(li);
        });

        const root = document.documentElement;
        document.getElementById('config-color-1').addEventListener('input', e => root.style.setProperty('--color-1', e.target.value));
        document.getElementById('config-color-2').addEventListener('input', e => root.style.setProperty('--color-2', e.target.value));
        document.getElementById('config-color-3').addEventListener('input', e => root.style.setProperty('--color-3', e.target.value));
        document.getElementById('config-color-4').addEventListener('input', e => root.style.setProperty('--color-4', e.target.value));
        
        let isBodoni = false;
        document.getElementById('font-toggle-btn').addEventListener('click', () => {
            isBodoni = !isBodoni;
            root.style.setProperty('--font-pair', isBodoni ? "'Bodoni Moda', serif" : "'Pretendard', sans-serif");
        });

        const pairNameDisplay = document.getElementById('pair-name-display');
        document.getElementById('font-size-up').addEventListener('click', () => {
            if(currentFontSize < 120) currentFontSize += 4;
            pairNameDisplay.style.fontSize = currentFontSize + 'px';
        });
        document.getElementById('font-size-down').addEventListener('click', () => {
            if(currentFontSize > 24) currentFontSize -= 4;
            pairNameDisplay.style.fontSize = currentFontSize + 'px';
        });

        document.getElementById('config-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    base64ImgData = event.target.result;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 캡처 영역 잘림 해결 (windowSize 강제 지정)
        document.getElementById('export-png-btn').addEventListener('click', () => {
            const target = document.getElementById('export-target');
            const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--color-4').trim();
            html2canvas(target, {
                useCORS: true, 
                backgroundColor: bgColor, 
                scale: 2,
                windowWidth: 1400, // 잘림 방지 캔버스 고정
                windowHeight: 900,
                x: 0, y: 0
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${pairNameDisplay.textContent}_box.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        // ----------------------------------------------------
        // [핵심] 보스의 기획: 넷플리파이 공유용 감상용 HTML 추출
        // ----------------------------------------------------
        document.getElementById('export-html-btn').addEventListener('click', () => {
            // 현재 설정된 CSS 변수 추출
            const cssVars = `
                :root {
                    --color-1: ${root.style.getPropertyValue('--color-1') || '#00f0ff'};
                    --color-2: ${root.style.getPropertyValue('--color-2') || '#ff007f'};
                    --color-3: ${root.style.getPropertyValue('--color-3') || '#7000ff'};
                    --color-4: ${root.style.getPropertyValue('--color-4') || '#050508'};
                    --font-pair: ${root.style.getPropertyValue('--font-pair') || "'Pretendard', sans-serif"};
                }
            `;

            // HTML 조립
            const htmlContent = `
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>${pairNameDisplay.textContent} - Playlist</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
