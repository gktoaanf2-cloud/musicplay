<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pair Music Box - Ultimate Halo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CORE DESIGN SYSTEM (4-Color System)
           ========================================= */
        :root {
            --color-1: #00f0ff; /* 포인트 1 */
            --color-2: #ff007f; /* 포인트 2 */
            --color-3: #7000ff; /* 포인트 3 */
            --color-4: #050508; /* 보스 픽: 커스텀 가능한 베이스/배경 컬러 */
            --font-pair: 'Pretendard', sans-serif; 
        }

        body {
            /* 이제 배경색마저 보스의 통제하에 있습니다 */
            background-color: var(--color-4);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-weight: 300;
            transition: background-color 0.5s ease;
        }

        /* 앰비언트 오로라 백그라운드 */
        .ambient-background {
            position: absolute; inset: 0; overflow: hidden; z-index: -1; 
            background: var(--color-4);
            transition: background 0.5s ease;
        }
        .ambient-blob {
            position: absolute; filter: blur(140px); opacity: 0.35; border-radius: 50%;
            animation: float 12s ease-in-out infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--color-1); animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: var(--color-2); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: var(--color-3); animation-delay: -2s; }

        @keyframes float { 100% { transform: translate(5%, 5%) scale(1.15); } }

        /* =========================================
           2. INVISIBLE EXPORT TARGET
           ========================================= */
        #export-target {
            width: 1400px; height: 850px; display: flex; flex-direction: column;
            position: relative; box-sizing: border-box; padding: 50px 60px;
            background: transparent; border: none; box-shadow: none;
        }

        .main-content { display: flex; flex: 1; gap: 120px; align-items: center; }

        /* =========================================
           3. TEXT-ONLY BUTTONS & TOOLS (4 Colors)
           ========================================= */
        .floating-tools {
            position: absolute; top: 40px; right: 50px; display: flex; gap: 20px; align-items: center; z-index: 100;
        }

        .text-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.6); font-size: 13px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); font-family: inherit;
            text-transform: uppercase; letter-spacing: 2px; padding: 5px; font-weight: 600;
        }
        .text-btn:hover {
            color: #fff; text-shadow: 0 0 15px var(--color-1), 0 0 30px var(--color-2); transform: translateY(-2px);
        }

        .color-picker-wrapper {
            position: relative; width: 16px; height: 16px; border-radius: 50%; overflow: hidden;
            box-shadow: 0 0 10px rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s;
        }
        .color-picker-wrapper:hover { transform: scale(1.5); box-shadow: 0 0 15px #fff; z-index: 10; }
        .color-picker-wrapper input[type="color"] {
            position: absolute; top: -10px; left: -10px; width: 40px; height: 40px; cursor: pointer; border: none;
        }
        
        /* 베이스 컬러 픽커 돋보이게 구분 */
        .base-color-picker { border: 2px solid #fff; width: 18px; height: 18px; }

        .font-controls { display: flex; gap: 10px; border-right: 1px solid rgba(255,255,255,0.2); padding-right: 20px; }
        .color-controls { display: flex; gap: 12px; align-items: center; border-right: 1px solid rgba(255,255,255,0.2); padding-right: 20px; }

        /* =========================================
           4. LP EDGE HALO GLOW (보스의 극찬을 받을 파트)
           ========================================= */
        .lp-wrapper {
            flex: 0 0 650px; display: flex; justify-content: center; align-items: center; position: relative;
        }

        /* 보스 요청: LP 외곽선을 따라 도는 거대한 빛무리 */
        .lp-halo-ring {
            position: absolute;
            width: 656px; /* LP보다 아주 살짝 커서 테두리처럼 보임 */
            height: 656px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--color-1), var(--color-2), var(--color-3), var(--color-1));
            animation: halo-spin 4s linear infinite;
            animation-play-state: paused;
            z-index: 0;
        }

        /* 블러 처리된 영롱한 후광 효과 */
        .lp-halo-ring::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: inherit;
            filter: blur(20px);
            opacity: 0.8;
            z-index: -1;
        }

        @keyframes halo-spin { 100% { transform: rotate(360deg); } }

        /* 베이스 컬러(--color-4)가 적용되는 진짜 LP판 */
        .lp-record {
            width: 650px; height: 650px; border-radius: 50%;
            background: var(--color-4); /* 고정 검정색 삭제, 제4의 색 적용 */
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8); /* 내부 깊이감 유지 */
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            z-index: 1;
            transition: background-color 0.5s ease;
        }

        /* LP 바이닐 결 */
        .lp-grooves {
            position: absolute; inset: 0; border-radius: 50%;
            background-image: repeating-radial-gradient(transparent 0, transparent 8px, rgba(255,255,255,0.04) 9px, transparent 10px);
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .lp-center-image {
            width: 280px; height: 280px; border-radius: 50%; background-color: var(--color-4);
            background-size: cover; background-position: center; position: relative; z-index: 10;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 0 60px var(--color-2), inset 0 0 30px rgba(0,0,0,0.9);
            cursor: pointer; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            background-image: url('https://via.placeholder.com/300?text=UPLOAD');
        }
        .lp-center-image:hover { box-shadow: 0 0 0 2px #fff, 0 0 90px var(--color-1), inset 0 0 20px rgba(0,0,0,0.5); transform: scale(1.05); }

        /* =========================================
           5. PLAYLIST
           ========================================= */
        .playlist-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; height: 100%; }

        .pair-name {
            font-family: var(--font-pair); font-size: 68px; font-weight: 700;
            background: linear-gradient(135deg, var(--color-1), var(--color-2), var(--color-3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; margin-bottom: 50px; outline: none; display: inline-block;
            transition: font-size 0.3s; text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .playlist-container { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .playlist-container::-webkit-scrollbar { display: none; }

        .track-item {
            display: flex; align-items: center; padding: 16px 20px; background: transparent;
            cursor: pointer; font-size: 16px; color: rgba(255,255,255,0.5); position: relative; transition: color 0.4s; font-weight: 400;
        }
        .track-item::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 1px;
            background: linear-gradient(90deg, var(--color-1), var(--color-3));
            box-shadow: 0 0 10px var(--color-1), 0 0 20px var(--color-3);
            transition: width 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .track-item:hover { color: #fff; }
        .track-item:hover::after { width: 100%; }
        .track-item.playing { color: #fff; font-weight: 600; text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .track-item.playing::after { width: 100%; opacity: 0.6; }

        .diamond-mark { width: 7px; height: 7px; background: #fff; transform: rotate(45deg); margin-right: 25px; opacity: 0.2; transition: 0.5s; }
        .track-item:hover .diamond-mark { opacity: 1; background: var(--color-1); box-shadow: 0 0 15px var(--color-1); }
        .track-item.playing .diamond-mark { opacity: 1; background: var(--color-3); box-shadow: 0 0 20px var(--color-3); }

        /* =========================================
           6. SOUNDBAR
           ========================================= */
        .player-bar {
            width: 100%; height: 60px; display: flex; align-items: center; background: transparent; border: none; margin-top: 70px;
        }

        .controls { display: flex; align-items: center; gap: 40px; }
        .control-btn { background: none; border: none; cursor: pointer; padding: 0; opacity: 0.5; transition: 0.4s; }
        .control-btn:hover { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 15px var(--color-2)); }
        .control-btn svg { width: 22px; height: 22px; fill: #fff; }
        .play-pause-btn svg { width: 36px; height: 36px; fill: url(#grad-play); }

        .progress-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; margin: 0 70px; gap: 15px; }
        .track-meta { display: flex; justify-content: space-between; font-size: 13px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
        #current-track-name { font-weight: 600; font-size: 15px; color: #fff; letter-spacing: 1px; }

        .progress-bar-container { width: 100%; height: 2px; background: rgba(255,255,255,0.15); cursor: pointer; position: relative; }
        .progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--color-1), var(--color-2), var(--color-3));
            box-shadow: 0 0 15px var(--color-2); position: relative; transition: width 0.1s linear;
        }
        .progress-fill::after {
            content: ''; position: absolute; right: -4px; top: -5px; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff;
        }

        .add-form { display: flex; gap: 20px; align-items: center; }
        .add-form input {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 8px 0; font-size: 13px; width: 150px; outline: none; transition: 0.4s; font-family: inherit;
        }
        .add-form input:focus { border-bottom-color: var(--color-3); box-shadow: 0 10px 15px -10px var(--color-3); }
    </style>
</head>
<body>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="grad-play" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--color-1); stop-opacity:1" />
                <stop offset="50%" style="stop-color:var(--color-2); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--color-3); stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <div class="ambient-background" data-html2canvas-ignore="true">
        <div class="ambient-blob blob-1"></div><div class="ambient-blob blob-2"></div><div class="ambient-blob blob-3"></div>
    </div>

    <div id="export-target">
        
        <div class="floating-tools" data-html2canvas-ignore="true">
            <!-- 폰트 컨트롤 -->
            <div class="font-controls">
                <button class="text-btn" id="font-size-down" title="폰트 축소">A-</button>
                <button class="text-btn" id="font-size-up" title="폰트 확대">A+</button>
                <button class="text-btn" id="font-toggle-btn" title="폰트 스타일 변경">FONT</button>
            </div>
            
            <!-- 4가지 컬러 시스템 (베이스 컬러 포함) -->
            <div class="color-controls">
                <div class="color-picker-wrapper" title="Theme 1 (포인트)"><input type="color" id="config-color-1" value="#00f0ff"></div>
                <div class="color-picker-wrapper" title="Theme 2 (포인트)"><input type="color" id="config-color-2" value="#ff007f"></div>
                <div class="color-picker-wrapper" title="Theme 3 (포인트)"><input type="color" id="config-color-3" value="#7000ff"></div>
                <div class="color-picker-wrapper base-color-picker" title="Theme 4 (베이스/배경)"><input type="color" id="config-color-4" value="#050508"></div>
            </div>
            
            <button class="text-btn" id="save-local-btn">SAVE</button>
            <button class="text-btn" id="export-png-btn">EXPORT PNG</button>
        </div>

        <div class="main-content">
            <div class="lp-wrapper">
                <!-- 보스의 명령으로 탄생한 외곽선 헤일로 빛무리 -->
                <div class="lp-halo-ring" id="halo-ring"></div>

                <!-- 내부 베이스 컬러(--color-4)가 적용되는 LP -->
                <div class="lp-record" id="lp-disk">
                    <div class="lp-grooves"></div>
                    <div class="lp-center-image" id="center-img" onclick="document.getElementById('config-file').click()"></div>
                </div>
            </div>

            <div class="playlist-wrapper">
                <div class="pair-name" id="pair-name-display" contenteditable="true" spellcheck="false" title="클릭해서 페어명 수정">ETERNAL_BOND</div>
                <ul class="playlist-container" id="playlist"></ul>
            </div>
        </div>

        <div class="player-bar">
            <div class="controls">
                <button class="control-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="control-btn play-pause-btn" id="btn-play-pause">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>

            <div class="progress-wrapper">
                <div class="track-meta">
                    <span id="current-track-name">NO TRACK SELECTED</span>
                    <span id="time-display">0:00 / 0:00</span>
                </div>
                <div class="progress-bar-container" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="add-form" data-html2canvas-ignore="true">
                <input type="text" id="yt-url" placeholder="YouTube URL">
                <input type="text" id="yt-title" placeholder="Track Title">
                <button class="text-btn" id="add-track-btn">ADD TRACK</button>
            </div>
        </div>
    </div>

    <input type="file" id="config-file" accept="image/*" style="display: none;">
    <div id="youtube-player" style="display:none; position:absolute;"></div>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player, progressInterval;
        let playlistData = [];
        let currentPlayingIndex = -1;
        let isPlaying = false;
        let base64ImgData = "https://via.placeholder.com/300?text=UPLOAD";
        let isBodoni = false;
        let currentFontSize = 68;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', { height: '0', width: '0', events: { 'onStateChange': onPlayerStateChange } });
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startProgressBar() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (player && isPlaying && player.getCurrentTime) {
                    const current = player.getCurrentTime();
                    const duration = player.getDuration();
                    if(duration > 0) {
                        document.getElementById('progress-fill').style.width = (current / duration) * 100 + '%';
                        document.getElementById('time-display').textContent = `${formatTime(current)} / ${formatTime(duration)}`;
                    }
                }
            }, 200);
        }

        function onPlayerStateChange(event) {
            const haloRing = document.getElementById('halo-ring'); // 새롭게 추가된 빛의 링
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                haloRing.style.animationPlayState = 'running'; // 외곽선 스핀 가동
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                startProgressBar();
            } else {
                isPlaying = false;
                haloRing.style.animationPlayState = 'paused'; // 외곽선 스핀 정지
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                clearInterval(progressInterval);
            }
            if (event.data === YT.PlayerState.ENDED) playNextTrack();
        }

        document.getElementById('progress-bar').addEventListener('click', (e) => {
            if (player && player.getDuration) {
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                player.seekTo(player.getDuration() * percent, true);
                document.getElementById('progress-fill').style.width = (percent * 100) + '%';
            }
        });

        function extractVideoID(url) {
            const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        document.getElementById('add-track-btn').addEventListener('click', () => {
            const videoId = extractVideoID(document.getElementById('yt-url').value);
            const title = document.getElementById('yt-title').value.trim() || "UNKNOWN TRACK";
            if (!videoId) return alert("유효한 유튜브 링크가 아닙니다.");
            playlistData.push({ videoId, title });
            document.getElementById('yt-url').value = ''; document.getElementById('yt-title').value = '';
            renderPlaylist();
        });

        function renderPlaylist() {
            const listContainer = document.getElementById('playlist');
            listContainer.innerHTML = '';
            playlistData.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                if (index === currentPlayingIndex) li.classList.add('playing');
                li.innerHTML = `<div class="diamond-mark"></div><span>${String(index + 1).padStart(2, '0')} &nbsp;&nbsp;&nbsp; ${track.title}</span>`;
                li.addEventListener('click', () => playTrack(index));
                listContainer.appendChild(li);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= playlistData.length) return;
            currentPlayingIndex = index;
            player.loadVideoById(playlistData[index].videoId);
            document.getElementById('current-track-name').textContent = playlistData[index].title;
            renderPlaylist();
        }

        function playNextTrack() { playTrack(currentPlayingIndex + 1 >= playlistData.length ? 0 : currentPlayingIndex + 1); }
        function playPrevTrack() { playTrack(currentPlayingIndex - 1 < 0 ? playlistData.length - 1 : currentPlayingIndex - 1); }

        document.getElementById('btn-play-pause').addEventListener('click', () => {
            if(currentPlayingIndex === -1 && playlistData.length > 0) playTrack(0);
            else if (player && player.getPlayerState) isPlaying ? player.pauseVideo() : player.playVideo();
        });
        document.getElementById('btn-next').addEventListener('click', playNextTrack);
        document.getElementById('btn-prev').addEventListener('click', playPrevTrack);

        // 4가지 컬러 픽커 연동 (제4의 베이스 컬러 포함)
        const root = document.documentElement;
        document.getElementById('config-color-1').addEventListener('input', e => root.style.setProperty('--color-1', e.target.value));
        document.getElementById('config-color-2').addEventListener('input', e => root.style.setProperty('--color-2', e.target.value));
        document.getElementById('config-color-3').addEventListener('input', e => root.style.setProperty('--color-3', e.target.value));
        document.getElementById('config-color-4').addEventListener('input', e => root.style.setProperty('--color-4', e.target.value));
        
        document.getElementById('font-toggle-btn').addEventListener('click', () => {
            isBodoni = !isBodoni;
            root.style.setProperty('--font-pair', isBodoni ? "'Bodoni Moda', serif" : "'Pretendard', sans-serif");
        });

        const pairNameDisplay = document.getElementById('pair-name-display');
        document.getElementById('font-size-up').addEventListener('click', () => {
            if(currentFontSize < 120) currentFontSize += 4;
            pairNameDisplay.style.fontSize = currentFontSize + 'px';
        });
        document.getElementById('font-size-down').addEventListener('click', () => {
            if(currentFontSize > 30) currentFontSize -= 4;
            pairNameDisplay.style.fontSize = currentFontSize + 'px';
        });

        pairNameDisplay.addEventListener('blur', () => {
            if(pairNameDisplay.textContent.trim() === '') pairNameDisplay.textContent = 'ETERNAL_BOND';
        });

        document.getElementById('config-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    base64ImgData = event.target.result;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('save-local-btn').addEventListener('click', () => {
            localStorage.setItem('pair_music_box_v9', JSON.stringify({
                pairName: pairNameDisplay.textContent,
                fontSize: currentFontSize,
                color1: document.getElementById('config-color-1').value,
                color2: document.getElementById('config-color-2').value,
                color3: document.getElementById('config-color-3').value,
                color4: document.getElementById('config-color-4').value,
                isBodoni: isBodoni,
                playlist: playlistData,
                imageData: base64ImgData
            }));
            alert("SYSTEM: 베이스 컬러까지 완벽하게. 오타쿠 서사 보존 완료.");
        });

        window.onload = () => {
            const saved = localStorage.getItem('pair_music_box_v9');
            if(saved) {
                const data = JSON.parse(saved);
                if(data.pairName) pairNameDisplay.textContent = data.pairName;
                if(data.fontSize) { currentFontSize = data.fontSize; pairNameDisplay.style.fontSize = currentFontSize + 'px'; }
                if(data.color1) { document.getElementById('config-color-1').value = data.color1; root.style.setProperty('--color-1', data.color1); }
                if(data.color2) { document.getElementById('config-color-2').value = data.color2; root.style.setProperty('--color-2', data.color2); }
                if(data.color3) { document.getElementById('config-color-3').value = data.color3; root.style.setProperty('--color-3', data.color3); }
                if(data.color4) { document.getElementById('config-color-4').value = data.color4; root.style.setProperty('--color-4', data.color4); }
                if(data.isBodoni) { isBodoni = true; root.style.setProperty('--font-pair', "'Bodoni Moda', serif"); }
                if(data.imageData) {
                    base64ImgData = data.imageData;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                }
                if(data.playlist) { playlistData = data.playlist; renderPlaylist(); }
            }
        };

        // PNG 캡처 기능 (오로라 배경까지 깔끔하게 캡처하기 위해 투명 배경 옵션 유지)
        document.getElementById('export-png-btn').addEventListener('click', () => {
            // 배경 컬러를 현재의 제4테마색(var(--color-4))으로 명시적으로 지정
            const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--color-4').trim();
            html2canvas(document.getElementById('export-target'), {
                useCORS: true, backgroundColor: bgColor, scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${pairNameDisplay.textContent}_music_box.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
