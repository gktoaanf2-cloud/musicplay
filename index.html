<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pair Music Box - Eternal Core</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style id="core-styles">
        /* =========================================
           1. CORE DESIGN SYSTEM 
           ========================================= */
        :root {
            --color-1: #ffffff;
            --color-2: #cccccc;
            --color-3: #888888;
            --color-4: #030305;
            --font-pair: 'Pretendard', sans-serif; 
        }

        body {
            background-color: var(--color-4);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-weight: 300;
        }

        .stardust-container { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .stardust-layer {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1.5px 1.5px at 150px 150px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 300px 80px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 450px 250px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 600px 30px, rgba(255,255,255,0.5), transparent);
            background-repeat: repeat; background-size: 800px 400px;
            animation: stardust-fall 40s linear infinite; opacity: 0.6;
        }
        .stardust-layer:nth-child(2) { background-size: 500px 300px; animation-duration: 60s; opacity: 0.3; transform: rotate(15deg); }
        @keyframes stardust-fall { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(400px) rotate(0deg); } }

        /* =========================================
           2. EXPORT TARGET
           ========================================= */
        #export-target {
            width: 1400px; height: 850px; display: flex; flex-direction: column;
            position: relative; box-sizing: border-box; padding: 50px 60px;
            background-color: transparent; z-index: 10;
        }

        .main-content { display: flex; flex: 1; gap: 120px; align-items: center; position: relative; z-index: 10; }

        /* =========================================
           3. TOOLS & UI 
           ========================================= */
        .floating-tools { position: absolute; top: 40px; right: 50px; display: flex; gap: 20px; align-items: center; z-index: 100; }
        
        .text-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 11px;
            cursor: pointer; transition: 0.4s; font-family: inherit; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; padding: 0;
        }
        .text-btn:hover { color: #fff; text-shadow: 0 0 10px var(--color-1), 0 0 20px var(--color-2); }

        .color-picker-wrapper {
            position: relative; width: 14px; height: 14px; border-radius: 2px; overflow: hidden;
            cursor: pointer; transition: 0.3s; border: none; box-shadow: 0 0 5px rgba(255,255,255,0.1);
            transform: rotate(45deg);
        }
        .color-picker-wrapper:hover { transform: rotate(45deg) scale(1.3); box-shadow: 0 0 15px var(--color-1); z-index: 10; }
        .color-picker-wrapper input[type="color"] {
            position: absolute; top: -15px; left: -15px; width: 45px; height: 45px; cursor: pointer; border: none;
            transform: rotate(-45deg);
        }
        .font-controls, .color-controls, .data-controls { display: flex; gap: 15px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px; align-items: center;}

        /* =========================================
           4. HOLOGRAPHIC LP & WAVE RIPPLES
           ========================================= */
        .lp-wrapper { flex: 0 0 650px; display: flex; justify-content: center; align-items: center; position: relative; }

        .sacred-geometry {
            position: absolute; inset: -50px; 
            background-image: url("data:image/svg+xml,%3Csvg width='750' height='750' viewBox='0 0 750 750' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23ffffff' stroke-width='1' fill='none' stroke-opacity='0.04'%3E%3Ccircle cx='375' cy='375' r='350'/%3E%3Ccircle cx='375' cy='375' r='280'/%3E%3Ccircle cx='375' cy='375' r='180'/%3E%3Cpath d='M375 25v700M25 375h700M127 127l496 496M127 623l496-496'/%3E%3C/g%3E%3C/svg%3E");
            background-position: center; background-repeat: no-repeat; pointer-events: none; z-index: 0;
            animation: master-spin 60s linear infinite reverse;
        }

        .lp-soundwaves { position: absolute; width: 650px; height: 650px; border-radius: 50%; pointer-events: none; z-index: 0; }
        .wave-ring {
            position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--color-1);
            animation: pulse-wave 4s ease-out infinite; animation-play-state: paused; opacity: 0;
        }
        .wave-ring:nth-child(2) { animation-delay: 1.3s; border-color: var(--color-2); }
        .wave-ring:nth-child(3) { animation-delay: 2.6s; border-color: var(--color-3); }
        
        @keyframes pulse-wave {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .lp-spin-master {
            width: 660px; height: 660px; display: flex; justify-content: center; align-items: center; position: relative;
            animation: master-spin 12s linear infinite; animation-play-state: paused; z-index: 1;
        }

        .lp-halo-ring {
            position: absolute; inset: 5px; border-radius: 50%;
            background: conic-gradient(from 0deg, var(--color-1), transparent 20%, var(--color-2) 40%, transparent 60%, var(--color-3) 80%, var(--color-1));
            opacity: 0.3; filter: blur(10px); z-index: 0; transition: opacity 0.5s;
        }

        .lp-record {
            width: 650px; height: 650px; border-radius: 50%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            position: relative; box-shadow: inset 0 0 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 1;
        }

        .lp-grooves {
            position: absolute; inset: 0; border-radius: 50%;
            background-image: repeating-radial-gradient(transparent 0, transparent 10px, rgba(255,255,255,0.03) 11px, rgba(255,255,255,0.05) 12px, transparent 13px);
            pointer-events: none; z-index: 2;
        }

        .lp-internal-glow {
            position: absolute; inset: -20px; border-radius: 50%;
            background: conic-gradient(from 90deg, transparent 0%, rgba(255,255,255,0.1) 25%, transparent 50%, rgba(255,255,255,0.1) 75%, transparent 100%);
            opacity: 0.5; pointer-events: none; z-index: 3; filter: blur(4px); mix-blend-mode: screen;
        }

        @keyframes master-spin { 100% { transform: rotate(360deg); } }

        .lp-center-image {
            width: 290px; height: 290px; border-radius: 50%; background-color: var(--color-4);
            background-size: cover; background-position: center; position: relative; z-index: 10;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 0 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.9);
            cursor: pointer; transition: 0.5s; background-image: url('https://via.placeholder.com/300?text=UPLOAD');
        }
        .lp-center-image:hover { box-shadow: 0 0 0 1px #fff, 0 0 60px var(--color-1); transform: scale(1.02); }

        /* =========================================
           5. PLAYLIST & SUB-TITLE
           ========================================= */
        .playlist-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; height: 100%; }

        .sub-title {
            font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 6px; text-transform: uppercase;
            margin-bottom: 5px; outline: none; font-weight: 500; transition: 0.3s;
        }
        .sub-title:focus { color: var(--color-1); text-shadow: 0 0 10px var(--color-1); }

        .pair-name {
            font-family: var(--font-pair); font-size: 68px; font-weight: 700;
            background: linear-gradient(135deg, var(--color-1), var(--color-2), var(--color-3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; margin-bottom: 40px; outline: none; display: inline-block;
            transition: font-size 0.2s; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        .playlist-container { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .playlist-container::-webkit-scrollbar { display: none; }

        .track-item {
            display: flex; align-items: center; padding: 14px 20px; background: transparent;
            cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.4); position: relative; transition: color 0.4s; font-weight: 300; letter-spacing: 1px;
        }
        .track-item::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 1px;
            background: linear-gradient(90deg, var(--color-1), var(--color-3));
            box-shadow: 0 0 10px var(--color-1); transition: width 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .track-item:hover { color: #fff; }
        .track-item:hover::after { width: 100%; }
        .track-item.playing { color: #fff; font-weight: 500; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .track-item.playing::after { width: 100%; opacity: 0.5; }

        .diamond-mark { width: 4px; height: 4px; background: #fff; transform: rotate(45deg); margin-right: 20px; opacity: 0.15; transition: 0.5s; }
        .track-item:hover .diamond-mark { opacity: 1; background: var(--color-1); box-shadow: 0 0 8px var(--color-1); }
        .track-item.playing .diamond-mark { opacity: 1; background: var(--color-2); box-shadow: 0 0 8px var(--color-2); }

        /* =========================================
           6. ULTRA-SLIM SOUNDBAR & REPEAT
           ========================================= */
        .player-bar { width: 100%; height: 60px; display: flex; align-items: center; margin-top: 80px; position: relative; z-index: 10; gap: 20px;}
        .controls { display: flex; align-items: center; gap: 25px; }
        .control-btn { background: none; border: none; cursor: pointer; padding: 0; opacity: 0.4; transition: 0.4s; display: flex; align-items: center; justify-content: center;}
        .control-btn:hover { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 10px var(--color-1)); }
        .control-btn.active { opacity: 1; filter: drop-shadow(0 0 10px var(--color-1)); }
        .control-btn.active svg { fill: var(--color-1); }
        .control-btn svg { width: 18px; height: 18px; fill: #fff; transition: fill 0.3s;}
        #btn-loop svg { width: 14px; height: 14px; }
        .play-pause-btn svg { width: 32px; height: 32px; fill: url(#grad-play); }

        .progress-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
        .track-meta { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
        #current-track-name { font-weight: 500; font-size: 13px; color: #fff; letter-spacing: 1px; }

        .progress-bar-container { width: 100%; height: 1px; background: rgba(255,255,255,0.15); cursor: pointer; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--color-1), var(--color-3)); box-shadow: 0 0 10px var(--color-1); position: relative; transition: width 0.1s linear; }
        .progress-fill::after { content: ''; position: absolute; right: -3px; top: -3px; width: 5px; height: 5px; background: #fff; transform: rotate(45deg); box-shadow: 0 0 10px #fff, 0 0 15px var(--color-1); }

        .volume-wrapper { display: flex; align-items: center; gap: 10px; margin-left: 15px; opacity: 0.5; transition: 0.3s; }
        .volume-wrapper:hover { opacity: 1; }
        .volume-wrapper svg { width: 14px; height: 14px; fill: #fff; }
        .volume-slider { -webkit-appearance: none; width: 60px; height: 1px; background: rgba(255,255,255,0.2); outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 6px; height: 6px; background: #fff; transform: rotate(45deg); box-shadow: 0 0 10px var(--color-1); }

        .add-form { display: flex; gap: 15px; align-items: center; margin-left: auto;}
        .add-form input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 4px 0; font-size: 12px; width: 110px; outline: none; transition: 0.4s; font-family: inherit; }
        .add-form input:focus { border-bottom-color: var(--color-1); box-shadow: 0 10px 10px -10px var(--color-1); }
    </style>
</head>
<body>
    <svg width="0" height="0">
        <defs>
            <linearGradient id="grad-play" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--color-1)" />
                <stop offset="50%" style="stop-color:var(--color-2)" />
                <stop offset="100%" style="stop-color:var(--color-3)" />
            </linearGradient>
        </defs>
    </svg>

    <div class="stardust-container" id="bg-stardust">
        <div class="stardust-layer"></div><div class="stardust-layer"></div>
    </div>

    <div id="export-target">
        
        <div class="floating-tools" id="editor-tools">
            <div class="font-controls">
                <button class="text-btn" id="font-size-down">A-</button>
                <button class="text-btn" id="font-size-up">A+</button>
                <button class="text-btn" id="font-toggle-btn">FONT</button>
            </div>
            
            <div class="color-controls">
                <div class="color-picker-wrapper"><input type="color" id="config-color-1" value="#ffffff"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-2" value="#cccccc"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-3" value="#888888"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-4" value="#030305"></div>
            </div>
            
            <!-- 보스 요청: JSON 데이터 내보내기/불러오기 -->
            <div class="data-controls">
                <button class="text-btn" id="export-json-btn">DATA OUT</button>
                <button class="text-btn" id="import-json-btn">DATA IN</button>
            </div>

            <button class="text-btn" id="export-html-btn" style="color: var(--color-2);">HTML SHARE</button>
        </div>

        <div class="main-content">
            <div class="lp-wrapper">
                <div class="sacred-geometry"></div>
                
                <div class="lp-soundwaves" id="soundwaves">
                    <div class="wave-ring"></div>
                    <div class="wave-ring"></div>
                    <div class="wave-ring"></div>
                </div>

                <div class="lp-spin-master" id="lp-master">
                    <div class="lp-halo-ring" id="halo-ring"></div>
                    <div class="lp-record">
                        <div class="lp-grooves"></div>
                        <div class="lp-internal-glow"></div>
                        <div class="lp-center-image" id="center-img" onclick="document.getElementById('config-file').click()"></div>
                    </div>
                </div>
            </div>

            <div class="playlist-wrapper">
                <div class="sub-title" id="sub-title-display" contenteditable="true" spellcheck="false">RECORD OF OUR GALAXY</div>
                <div class="pair-name" id="pair-name-display" contenteditable="true" spellcheck="false">COSMIC_BOND</div>
                <ul class="playlist-container" id="playlist"></ul>
            </div>
        </div>

        <div class="player-bar">
            <div class="controls">
                <button class="control-btn" id="btn-prev" title="이전 곡"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="control-btn play-pause-btn" id="btn-play-pause">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="btn-next" title="다음 곡"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="control-btn" id="btn-loop" title="한 곡 반복">
                    <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
            </div>

            <div class="progress-wrapper">
                <div class="track-meta">
                    <span id="current-track-name">NO TRACK SELECTED</span>
                    <span id="time-display">0:00 / 0:00</span>
                </div>
                <div class="progress-bar-container" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            
            <div class="volume-wrapper">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100">
            </div>

            <div class="add-form" id="add-track-form">
                <input type="text" id="yt-url" placeholder="YouTube URL">
                <input type="text" id="yt-title" placeholder="Track Title">
                <button class="text-btn" id="add-track-btn">ADD</button>
            </div>
        </div>
    </div>

    <!-- 숨겨진 시스템 요소 -->
    <input type="file" id="config-file" accept="image/*" style="display: none;">
    <input type="file" id="import-json-file" accept=".json" style="display: none;">
    <div id="youtube-player" style="display:none; position:absolute;"></div>

    <script id="core-logic">
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player, progressInterval;
        if (typeof playlistData === 'undefined') { window.playlistData = []; }
        let currentPlayingIndex = -1;
        let isPlaying = false;
        let isLooping = false;
        let base64ImgData = "https://via.placeholder.com/300?text=UPLOAD";
        let currentFontSize = 68;
        let isBodoni = false;
        const root = document.documentElement;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', { 
                height: '0', width: '0', 
                events: { 'onStateChange': onPlayerStateChange, 'onReady': onPlayerReady } 
            });
        }

        function onPlayerReady(event) {
            const volSlider = document.getElementById('volume-slider');
            if(volSlider) player.setVolume(volSlider.value);
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startProgressBar() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (player && isPlaying && player.getCurrentTime) {
                    const current = player.getCurrentTime();
                    const duration = player.getDuration();
                    if(duration > 0) {
                        document.getElementById('progress-fill').style.width = (current / duration) * 100 + '%';
                        document.getElementById('time-display').textContent = `${formatTime(current)} / ${formatTime(duration)}`;
                    }
                }
            }, 200);
        }

        function onPlayerStateChange(event) {
            const lpMaster = document.getElementById('lp-master');
            const haloRing = document.getElementById('halo-ring');
            const waveRings = document.querySelectorAll('.wave-ring');
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                lpMaster.style.animationPlayState = 'running';
                haloRing.style.opacity = '0.7'; 
                waveRings.forEach(ring => ring.style.animationPlayState = 'running');
                
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                startProgressBar();
            } else {
                isPlaying = false;
                lpMaster.style.animationPlayState = 'paused';
                haloRing.style.opacity = '0.3'; 
                waveRings.forEach(ring => ring.style.animationPlayState = 'paused');

                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                clearInterval(progressInterval);
            }
            
            if (event.data === YT.PlayerState.ENDED) {
                if(isLooping) {
                    player.seekTo(0);
                    player.playVideo();
                } else {
                    playNextTrack();
                }
            }
        }

        document.getElementById('progress-bar').addEventListener('click', (e) => {
            if (player && player.getDuration) {
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                player.seekTo(player.getDuration() * percent, true);
                document.getElementById('progress-fill').style.width = (percent * 100) + '%';
            }
        });

        const volSlider = document.getElementById('volume-slider');
        if(volSlider) {
            volSlider.addEventListener('input', (e) => {
                if(player && player.setVolume) player.setVolume(e.target.value);
            });
        }

        document.getElementById('btn-loop').addEventListener('click', (e) => {
            isLooping = !isLooping;
            e.currentTarget.classList.toggle('active', isLooping);
        });

        document.getElementById('playlist').addEventListener('click', (e) => {
            const trackItem = e.target.closest('.track-item');
            if(trackItem) {
                const index = Array.from(trackItem.parentNode.children).indexOf(trackItem);
                playTrack(index);
            }
        });

        function playTrack(index) {
            if (index < 0 || index >= window.playlistData.length) return;
            currentPlayingIndex = index;
            player.loadVideoById(window.playlistData[index].videoId);
            document.getElementById('current-track-name').textContent = window.playlistData[index].title;
            
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, idx) => {
                if(idx === currentPlayingIndex) item.classList.add('playing');
                else item.classList.remove('playing');
            });
        }

        function playNextTrack() { playTrack(currentPlayingIndex + 1 >= window.playlistData.length ? 0 : currentPlayingIndex + 1); }
        function playPrevTrack() { playTrack(currentPlayingIndex - 1 < 0 ? window.playlistData.length - 1 : currentPlayingIndex - 1); }

        document.getElementById('btn-play-pause').addEventListener('click', () => {
            if(currentPlayingIndex === -1 && window.playlistData.length > 0) playTrack(0);
            else if (player && player.getPlayerState) isPlaying ? player.pauseVideo() : player.playVideo();
        });
        document.getElementById('btn-next').addEventListener('click', playNextTrack);
        document.getElementById('btn-prev').addEventListener('click', playPrevTrack);

        // ==========================================
        // [AUTO-SAVE ENGINE] - 로컬 스토리지 실시간 동기화
        // ==========================================
        function autoSave() {
            const data = {
                pairName: document.getElementById('pair-name-display').textContent,
                subTitle: document.getElementById('sub-title-display').textContent,
                fontSize: currentFontSize,
                color1: document.getElementById('config-color-1').value,
                color2: document.getElementById('config-color-2').value,
                color3: document.getElementById('config-color-3').value,
                color4: document.getElementById('config-color-4').value,
                isBodoni: isBodoni,
                playlist: window.playlistData,
                imageData: base64ImgData
            };
            localStorage.setItem('pair_music_box_v17', JSON.stringify(data));
        }

        function renderPlaylist() {
            const listContainer = document.getElementById('playlist');
            listContainer.innerHTML = '';
            window.playlistData.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                if (index === currentPlayingIndex) li.classList.add('playing');
                li.innerHTML = `<div class="diamond-mark"></div><span>${String(index + 1).padStart(2, '0')} &nbsp;&nbsp;&nbsp; ${track.title}</span>`;
                li.addEventListener('click', () => playTrack(index));
                listContainer.appendChild(li);
            });
        }

        function loadData(data) {
            if(data.pairName) document.getElementById('pair-name-display').textContent = data.pairName;
            if(data.subTitle) document.getElementById('sub-title-display').textContent = data.subTitle;
            if(data.fontSize) { currentFontSize = data.fontSize; document.getElementById('pair-name-display').style.fontSize = currentFontSize + 'px'; }
            if(data.color1) { document.getElementById('config-color-1').value = data.color1; root.style.setProperty('--color-1', data.color1); }
            if(data.color2) { document.getElementById('config-color-2').value = data.color2; root.style.setProperty('--color-2', data.color2); }
            if(data.color3) { document.getElementById('config-color-3').value = data.color3; root.style.setProperty('--color-3', data.color3); }
            if(data.color4) { document.getElementById('config-color-4').value = data.color4; root.style.setProperty('--color-4', data.color4); }
            if(data.isBodoni) { isBodoni = true; root.style.setProperty('--font-pair', "'Bodoni Moda', serif"); }
            if(data.imageData) { base64ImgData = data.imageData; document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`; }
            if(data.playlist) { window.playlistData = data.playlist; renderPlaylist(); }
        }

        window.onload = () => {
            const saved = localStorage.getItem('pair_music_box_v17');
            if(saved) {
                try { loadData(JSON.parse(saved)); } catch(e) {}
            }
        };

        // 데이터 변경 시 Auto-Save 트리거
        document.getElementById('config-color-1').addEventListener('input', e => { root.style.setProperty('--color-1', e.target.value); autoSave(); });
        document.getElementById('config-color-2').addEventListener('input', e => { root.style.setProperty('--color-2', e.target.value); autoSave(); });
        document.getElementById('config-color-3').addEventListener('input', e => { root.style.setProperty('--color-3', e.target.value); autoSave(); });
        document.getElementById('config-color-4').addEventListener('input', e => { root.style.setProperty('--color-4', e.target.value); autoSave(); });
        
        document.getElementById('font-toggle-btn').addEventListener('click', () => {
            isBodoni = !isBodoni;
            root.style.setProperty('--font-pair', isBodoni ? "'Bodoni Moda', serif" : "'Pretendard', sans-serif");
            autoSave();
        });

        const pairNameDisplay = document.getElementById('pair-name-display');
        const subTitleDisplay = document.getElementById('sub-title-display');
        
        document.getElementById('font-size-up').addEventListener('click', () => {
            if(currentFontSize < 120) currentFontSize += 4;
            pairNameDisplay.style.fontSize = currentFontSize + 'px';
            autoSave();
        });
        document.getElementById('font-size-down').addEventListener('click', () => {
            if(currentFontSize > 24) currentFontSize -= 4;
            pairNameDisplay.style.fontSize = currentFontSize + 'px';
            autoSave();
        });

        pairNameDisplay.addEventListener('blur', () => { if(pairNameDisplay.textContent.trim() === '') pairNameDisplay.textContent = 'COSMIC_BOND'; autoSave(); });
        subTitleDisplay.addEventListener('blur', () => { if(subTitleDisplay.textContent.trim() === '') subTitleDisplay.textContent = 'RECORD OF OUR GALAXY'; autoSave(); });

        document.getElementById('config-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    base64ImgData = event.target.result;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                    autoSave();
                };
                reader.readAsDataURL(file);
            }
        });

        function extractVideoID(url) {
            const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        document.getElementById('add-track-btn').addEventListener('click', () => {
            const videoId = extractVideoID(document.getElementById('yt-url').value);
            const title = document.getElementById('yt-title').value.trim() || "UNKNOWN TRACK";
            if (!videoId) return alert("유효한 유튜브 링크가 아닙니다.");
            window.playlistData.push({ videoId, title });
            document.getElementById('yt-url').value = ''; document.getElementById('yt-title').value = '';
            renderPlaylist();
            autoSave();
        });

        // ==========================================
        // [JSON EXPORT / IMPORT] 서사 파일 추출 및 복원
        // ==========================================
        document.getElementById('export-json-btn').addEventListener('click', () => {
            autoSave();
            const savedData = localStorage.getItem('pair_music_box_v17');
            const blob = new Blob([savedData], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${pairNameDisplay.textContent}_Data.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('import-json-btn').addEventListener('click', () => {
            document.getElementById('import-json-file').click();
        });

        document.getElementById('import-json-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                try {
                    const data = JSON.parse(event.target.result);
                    loadData(data);
                    autoSave();
                    alert("보스! 성공적으로 서사 데이터를 복원했습니다.");
                } catch(err) {
                    alert("손상된 파일입니다.");
                }
            };
            reader.readAsText(file);
        });

        // ==========================================
        // [HTML 완벽 내보내기] 절대값(Important) 강제 주입
        // ==========================================
        document.getElementById('export-html-btn').addEventListener('click', () => {
            autoSave();
            const c1 = document.getElementById('config-color-1').value;
            const c2 = document.getElementById('config-color-2').value;
            const c3 = document.getElementById('config-color-3').value;
            const c4 = document.getElementById('config-color-4').value;
            const fp = root.style.getPropertyValue('--font-pair') || "'Pretendard', sans-serif";

            const htmlContent = `
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${pairNameDisplay.textContent} - Cosmic Playlist</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    <style>
        /* 보스. 테마색이 절대 깨지지 않도록 하드코딩 인젝트 처리 완료 */
        :root {
            --color-1: ${c1} !important;
            --color-2: ${c2} !important;
            --color-3: ${c3} !important;
            --color-4: ${c4} !important;
            --font-pair: ${fp} !important;
        }
        html, body { background-color: var(--color-4) !important; width: 100%; height: 100%; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #viewer-wrapper { width: 1400px; height: 850px; transform-origin: center center; position: relative; }
        ${document.getElementById('core-styles').innerHTML}
    </style>
</head>
<body>
    <svg width="0" height="0">
        <defs>
            <linearGradient id="grad-play" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--color-1)" />
                <stop offset="50%" style="stop-color:var(--color-2)" />
                <stop offset="100%" style="stop-color:var(--color-3)" />
            </linearGradient>
        </defs>
    </svg>

    <div class="stardust-container">
        <div class="stardust-layer"></div><div class="stardust-layer"></div>
    </div>

    <div id="viewer-wrapper">
        <div id="export-target" style="padding:0; width:100%; height:100%;">
            <div class="main-content">
                <div class="lp-wrapper">
                    <div class="sacred-geometry"></div>
                    <div class="lp-soundwaves">
                        <div class="wave-ring"></div><div class="wave-ring"></div><div class="wave-ring"></div>
                    </div>
                    <div class="lp-spin-master" id="lp-master">
                        <div class="lp-halo-ring" id="halo-ring"></div>
                        <div class="lp-record">
                            <div class="lp-grooves"></div>
                            <div class="lp-internal-glow"></div>
                            <div class="lp-center-image" id="center-img" style="background-image: url('${base64ImgData}'); cursor: default;"></div>
                        </div>
                    </div>
                </div>

                <div class="playlist-wrapper">
                    <div class="sub-title">${subTitleDisplay.textContent}</div>
                    <div class="pair-name" id="pair-name-display" style="font-size: ${currentFontSize}px;">${pairNameDisplay.textContent}</div>
                    <ul class="playlist-container" id="playlist">
                        ${document.getElementById('playlist').innerHTML}
                    </ul>
                </div>
            </div>

            <div class="player-bar">
                <div class="controls">
                    <button class="control-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                    <button class="control-btn play-pause-btn" id="btn-play-pause">
                        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button class="control-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                    <button class="control-btn" id="btn-loop">
                        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                    </button>
                </div>

                <div class="progress-wrapper">
                    <div class="track-meta">
                        <span id="current-track-name">NO TRACK SELECTED</span>
                        <span id="time-display">0:00 / 0:00</span>
                    </div>
                    <div class="progress-bar-container" id="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                
                <div class="volume-wrapper" style="margin-left: auto;">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100">
                </div>
            </div>
        </div>
    </div>
    
    <div id="youtube-player" style="display:none; position:absolute;"></div>
    
    <script>
        window.playlistData = ${JSON.stringify(window.playlistData)};
        
        function resizeFit() {
            const wrapper = document.getElementById('viewer-wrapper');
            const scale = Math.min(window.innerWidth / 1400, window.innerHeight / 850);
            wrapper.style.transform = 'scale(' + (scale > 1 ? 1 : scale) + ')';
        }
        window.addEventListener('resize', resizeFit);
        resizeFit();

        ${document.getElementById('core-logic').innerHTML}
    <\/script>
</body>
</html>`;

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${pairNameDisplay.textContent}_CosmicViewer.html`;
            a.click();
            URL.revokeObjectURL(url);
            alert("✨ 보스. 테마색 영구 박제 및 HTML 추출이 완벽하게 완료되었습니다.");
        });
    </script>
</body>
</html>
