<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pair Music Box</title>
    <style>
        /* =========================================
           1. DESIGN SYSTEM & VARIABLES
           ========================================= */
        :root {
            --theme-color: #d4af37; /* 무기미도 느낌의 바랜 골드 */
            --bg-color: #0b0b0e;
            --line-color: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace; /* 타자기/터미널 느낌 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* =========================================
           2. MAIN CONTAINER (Thin-line & Chamfered)
           ========================================= */
        .container {
            display: flex;
            width: 900px;
            height: 500px;
            border: 1px solid var(--line-color);
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            /* 45도 깎인 모서리 (사이버펑크 느낌) */
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        }

        /* =========================================
           3. LP RECORD & HOLOGRAM
           ========================================= */
        .lp-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--line-color);
            position: relative;
        }

        .lp-record {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            /* LP판 결 + 홀로그램 그라데이션 */
            background: 
                repeating-radial-gradient(
                    #111 0, 
                    #111 4px, 
                    #222 5px, 
                    #111 6px
                ),
                conic-gradient(
                    from 0deg, 
                    rgba(255,0,0,0.2), rgba(255,255,0,0.2), rgba(0,255,0,0.2), 
                    rgba(0,255,255,0.2), rgba(0,0,255,0.2), rgba(255,0,255,0.2), rgba(255,0,0,0.2)
                );
            background-blend-mode: overlay;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 
                        inset 0 0 20px var(--theme-color);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 5s linear infinite; /* 무한 회전 애니메이션 */
            animation-play-state: paused; /* 초기 상태는 정지 */
        }

        .lp-center-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-image: url('https://via.placeholder.com/100'); /* 임시 이미지 */
            background-size: cover;
            background-position: center;
            border: 3px solid var(--theme-color);
            z-index: 10;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* =========================================
           4. PLAYLIST & UI CONTROLS
           ========================================= */
        .playlist-section {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .pair-name {
            font-size: 24px;
            font-weight: bold;
            color: var(--theme-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .control-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .control-panel input {
            background: transparent;
            border: 1px solid var(--line-color);
            color: #fff;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        .control-panel input:focus {
            border-color: var(--theme-color);
        }

        #yt-url { flex: 2; }
        #yt-title { flex: 1; }

        .control-panel button {
            background: transparent;
            border: 1px solid var(--theme-color);
            color: var(--theme-color);
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            padding: 0 15px;
            transition: all 0.3s;
        }

        .control-panel button:hover {
            background: var(--theme-color);
            color: var(--bg-color);
        }

        .playlist-container {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--line-color);
            padding: 10px;
        }

        /* 스크롤바 숨기기 */
        .playlist-container::-webkit-scrollbar { display: none; }

        .track-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px dashed var(--line-color);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.05);
            padding-left: 15px;
            border-left: 3px solid var(--theme-color);
        }

        .track-item.playing {
            color: var(--theme-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="export-target">
        
        <div class="lp-section">
            <div class="lp-record" id="lp-disk">
                <div class="lp-center-image" id="center-img"></div>
            </div>
        </div>

        <div class="playlist-section">
            <div class="pair-name" id="pair-name-display">Pair_Name_Here</div>
            
            <div class="control-panel">
                <input type="text" id="yt-url" placeholder="YouTube Link (ex: https://youtu.be/...)">
                <input type="text" id="yt-title" placeholder="Track Title">
                <button id="add-track-btn">[ ADD_TRACK ]</button>
            </div>

            <ul class="playlist-container" id="playlist">
                </ul>

            <div id="youtube-player" style="display:none; position:absolute;"></div>
        </div>
    </div>

    <script>
        // 1. 유튜브 IFrame API 비동기 로드
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        let playlistData = [];
        let currentPlayingIndex = -1;

        // API 준비 완료 시 실행
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            console.log("[SYSTEM] Audio Engine Online.");
        }

        // 2. 플레이어 상태 감지 -> LP판 애니메이션 제어
        function onPlayerStateChange(event) {
            const lpDisk = document.getElementById('lp-disk');
            
            if (event.data === YT.PlayerState.PLAYING) {
                lpDisk.style.animationPlayState = 'running'; // 재생 시 회전
            } else {
                lpDisk.style.animationPlayState = 'paused'; // 정지 시 멈춤
            }

            if (event.data === YT.PlayerState.ENDED) {
                playNextTrack(); // 곡 끝나면 다음 곡으로
            }
        }

        // 3. 유튜브 주소에서 영상 ID만 쏙 빼오는 마법의 정규식
        function extractVideoID(url) {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regExp);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        // 4. 트랙 추가 버튼 이벤트
        document.getElementById('add-track-btn').addEventListener('click', () => {
            const urlInput = document.getElementById('yt-url');
            const titleInput = document.getElementById('yt-title');
            const videoId = extractVideoID(urlInput.value);
            let title = titleInput.value.trim();

            if (!videoId) {
                alert("파트너, 유튜브 링크가 유효하지 않아! 다시 확인해줘.");
                return;
            }

            if (!title) title = "Unknown Track " + (playlistData.length + 1);

            playlistData.push({ videoId, title });
            urlInput.value = '';
            titleInput.value = '';

            renderPlaylist();
        });

        // 5. 플레이리스트 화면에 그리기
        function renderPlaylist() {
            const listContainer = document.getElementById('playlist');
            listContainer.innerHTML = '';

            playlistData.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                if (index === currentPlayingIndex) li.classList.add('playing');
                
                li.innerHTML = `<span>▶ ${track.title}</span>`;
                
                li.addEventListener('click', () => playTrack(index));
                listContainer.appendChild(li);
            });
        }

        // 6. 음악 재생 함수
        function playTrack(index) {
            if (index < 0 || index >= playlistData.length) return;
            
            currentPlayingIndex = index;
            player.loadVideoById(playlistData[index].videoId);
            renderPlaylist();
        }

        function playNextTrack() {
            if (playlistData.length === 0) return;
            let nextIndex = currentPlayingIndex + 1;
            if (nextIndex >= playlistData.length) nextIndex = 0;
            playTrack(nextIndex);
        }
    </script>
</body>
</html>
