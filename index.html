<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pair Music Box - The Ultimate Masterpiece</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* =========================================
           1. CORE DESIGN SYSTEM (Absolute Transparency)
           ========================================= */
        :root {
            --color-1: #00f0ff;
            --color-2: #ff007f;
            --bg-dark: #000000;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 70%);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-weight: 300;
        }

        /* =========================================
           2. INVISIBLE EXPORT TARGET
           ========================================= */
        #export-target {
            width: 1400px;
            height: 800px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            padding: 40px;
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 100px;
            align-items: center;
        }

        /* =========================================
           3. FLOATING COMPACT TOOLS (Top Right)
           ========================================= */
        .floating-tools {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 1px;
            font-family: inherit;
        }

        .tool-btn:hover {
            border-color: var(--color-1);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .color-picker-wrapper {
            position: relative;
            width: 24px; height: 24px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
        }
        
        .color-picker-wrapper input[type="color"] {
            position: absolute; top: -10px; left: -10px; width: 50px; height: 50px; cursor: pointer; border: none;
        }

        /* =========================================
           4. HOLOGRAPHIC LP WITH GROOVES
           ========================================= */
        .lp-wrapper {
            flex: 0 0 650px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .lp-record {
            width: 650px;
            height: 650px;
            border-radius: 50%;
            background-color: #030303;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 바이닐 내부 선 (Grooves) - 적당한 밀도 */
        .lp-grooves {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background-image: repeating-radial-gradient(
                transparent 0,
                transparent 15px,
                rgba(255,255,255,0.03) 16px,
                transparent 17px
            );
            pointer-events: none;
        }

        /* 빙글빙글 도는 홀로그램 빛 애니메이션 */
        .lp-hologram-light {
            position: absolute;
            inset: -50%;
            background: conic-gradient(
                from 0deg, 
                transparent 0%, 
                rgba(0, 240, 255, 0.4) 20%, 
                transparent 40%, 
                transparent 60%, 
                rgba(255, 0, 127, 0.4) 80%, 
                transparent 100%
            );
            mix-blend-mode: screen;
            animation: holo-spin 6s linear infinite;
            animation-play-state: paused;
            pointer-events: none;
        }

        @keyframes holo-spin { 100% { transform: rotate(360deg); } }

        .lp-center-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #111;
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1),
                        0 0 40px var(--color-1), 
                        inset 0 0 20px rgba(0,0,0,0.8);
            cursor: pointer;
            transition: 0.3s;
        }

        .lp-center-image:hover {
            box-shadow: 0 0 0 2px #fff, 0 0 60px var(--color-2), inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* =========================================
           5. PLAYLIST (Slow Glow Underline)
           ========================================= */
        .playlist-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        /* 직접 클릭해서 수정 가능한 페어명 (인라인 에디트) */
        .pair-name {
            font-size: 60px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--color-1), #fff, var(--color-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin-bottom: 50px;
            outline: none;
            display: inline-block;
            transition: 0.3s;
        }
        .pair-name:focus { text-shadow: 0 0 20px rgba(255,255,255,0.3); }

        .playlist-container {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 450px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .playlist-container::-webkit-scrollbar { display: none; }

        .track-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: transparent; /* 사각형 껍데기 삭제 */
            cursor: pointer;
            font-size: 16px;
            color: #888;
            position: relative;
            transition: color 0.4s;
        }

        /* 마우스 오버 시 느리게 그어지는 글로우 하단 선 */
        .track-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 1px;
            background: linear-gradient(90deg, var(--color-1), var(--color-2));
            box-shadow: 0 0 10px var(--color-1), 0 0 20px var(--color-2);
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .track-item:hover { color: #fff; }
        .track-item:hover::after { width: 100%; }

        .track-item.playing { color: #fff; font-weight: 600; }
        .track-item.playing::after { width: 100%; opacity: 0.5; }

        .diamond-mark {
            width: 6px; height: 6px;
            background: #fff;
            transform: rotate(45deg);
            margin-right: 25px;
            opacity: 0.2;
            transition: 0.6s;
        }
        .track-item:hover .diamond-mark {
            opacity: 1;
            background: var(--color-1);
            box-shadow: 0 0 15px var(--color-1);
        }
        .track-item.playing .diamond-mark {
            opacity: 1;
            background: var(--color-2);
            box-shadow: 0 0 20px var(--color-2);
        }

        /* =========================================
           6. TRANSPARENT FLOATING PLAYER BAR
           ========================================= */
        .player-bar {
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            background: transparent; /* 껍데기 삭제 */
            border: none;
            margin-top: 20px;
        }

        .controls { display: flex; align-items: center; gap: 40px; }
        .control-btn { background: none; border: none; cursor: pointer; padding: 0; opacity: 0.5; transition: 0.4s; }
        .control-btn:hover { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--color-1)); }
        .control-btn svg { width: 20px; height: 20px; fill: #fff; }
        .play-pause-btn svg { width: 32px; height: 32px; fill: url(#grad-play); }

        .progress-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 0 60px;
            gap: 12px;
        }

        .track-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        #current-track-name { font-weight: 600; font-size: 14px; color: #fff; letter-spacing: 1px; }

        .progress-bar-container {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--color-1), var(--color-2));
            box-shadow: 0 0 15px var(--color-1);
            position: relative;
            transition: width 0.1s linear;
        }

        .progress-fill::after {
            content: ''; position: absolute; right: -3px; top: -4px; width: 10px; height: 10px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff;
        }

        .add-form { display: flex; gap: 20px; align-items: center; }
        .add-form input {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 0; font-size: 13px; width: 150px; outline: none; transition: 0.4s; font-family: inherit;
        }
        .add-form input:focus { border-bottom-color: var(--color-1); box-shadow: 0 10px 10px -10px var(--color-1); }
        
        .add-btn {
            background: transparent; color: rgba(255,255,255,0.5); font-size: 12px; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .add-btn:hover { color: #fff; text-shadow: 0 0 10px var(--color-1); }
    </style>
</head>
<body>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="grad-play" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--color-1); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--color-2); stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <div id="export-target">
        
        <!-- 보스의 디렉팅: 컴팩트 플로팅 툴바 (캡처 시 자동 숨김) -->
        <div class="floating-tools" data-html2canvas-ignore="true">
            <div class="color-picker-wrapper" title="Theme 1"><input type="color" id="config-color-1" value="#00f0ff"></div>
            <div class="color-picker-wrapper" title="Theme 2"><input type="color" id="config-color-2" value="#ff007f"></div>
            <button class="tool-btn" id="save-local-btn">SAVE</button>
            <button class="tool-btn" id="export-png-btn" style="border-color: var(--color-1); color: var(--color-1);">EXPORT PNG</button>
        </div>

        <div class="main-content">
            <!-- 650px LP판 + 바이닐 선 + 스피닝 홀로그램 -->
            <div class="lp-wrapper">
                <div class="lp-record" id="lp-disk">
                    <div class="lp-grooves"></div>
                    <div class="lp-hologram-light"></div>
                    <!-- 중앙 이미지를 누르면 바로 이미지 업로드 창이 뜨도록 직관적 설계 -->
                    <div class="lp-center-image" id="center-img" style="background-image: url('https://via.placeholder.com/200?text=CLICK+TO+UPLOAD');" onclick="document.getElementById('config-file').click()"></div>
                </div>
            </div>

            <!-- 투명 플레이리스트 & 인라인 에디팅 페어명 -->
            <div class="playlist-wrapper">
                <div class="pair-name" id="pair-name-display" contenteditable="true" spellcheck="false" title="클릭해서 페어명 수정">ETERNAL_BOND</div>
                <ul class="playlist-container" id="playlist"></ul>
            </div>
        </div>

        <!-- 껍데기를 벗어던진 하단 투명 컨트롤 바 -->
        <div class="player-bar">
            <div class="controls">
                <button class="control-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="control-btn play-pause-btn" id="btn-play-pause">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>

            <div class="progress-wrapper">
                <div class="track-meta">
                    <span id="current-track-name">NO TRACK SELECTED</span>
                    <span id="time-display">0:00 / 0:00</span>
                </div>
                <div class="progress-bar-container" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="add-form" data-html2canvas-ignore="true">
                <input type="text" id="yt-url" placeholder="YouTube URL">
                <input type="text" id="yt-title" placeholder="Track Title">
                <button class="add-btn" id="add-track-btn">ADD TRACK</button>
            </div>
        </div>
    </div>

    <!-- 숨겨진 시스템 요소들 -->
    <input type="file" id="config-file" accept="image/*" style="display: none;">
    <div id="youtube-player" style="display:none; position:absolute;"></div>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        let playlistData = [];
        let currentPlayingIndex = -1;
        let isPlaying = false;
        let progressInterval;
        let base64ImgData = "https://via.placeholder.com/200?text=OC+PAIR";

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', { height: '0', width: '0', events: { 'onStateChange': onPlayerStateChange } });
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startProgressBar() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (player && isPlaying && player.getCurrentTime) {
                    const current = player.getCurrentTime();
                    const duration = player.getDuration();
                    if(duration > 0) {
                        document.getElementById('progress-fill').style.width = (current / duration) * 100 + '%';
                        document.getElementById('time-display').textContent = `${formatTime(current)} / ${formatTime(duration)}`;
                    }
                }
            }, 200);
        }

        function onPlayerStateChange(event) {
            const holoLight = document.querySelector('.lp-hologram-light');
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                holoLight.style.animationPlayState = 'running';
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                startProgressBar();
            } else {
                isPlaying = false;
                holoLight.style.animationPlayState = 'paused';
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                clearInterval(progressInterval);
            }
            if (event.data === YT.PlayerState.ENDED) playNextTrack();
        }

        document.getElementById('progress-bar').addEventListener('click', (e) => {
            if (player && player.getDuration) {
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                player.seekTo(player.getDuration() * percent, true);
                document.getElementById('progress-fill').style.width = (percent * 100) + '%';
            }
        });

        function extractVideoID(url) {
            const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        document.getElementById('add-track-btn').addEventListener('click', () => {
            const videoId = extractVideoID(document.getElementById('yt-url').value);
            const title = document.getElementById('yt-title').value.trim() || "UNKNOWN TRACK";
            if (!videoId) return alert("유효한 유튜브 링크가 아닙니다.");
            playlistData.push({ videoId, title });
            document.getElementById('yt-url').value = ''; document.getElementById('yt-title').value = '';
            renderPlaylist();
        });

        function renderPlaylist() {
            const listContainer = document.getElementById('playlist');
            listContainer.innerHTML = '';
            playlistData.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                if (index === currentPlayingIndex) li.classList.add('playing');
                li.innerHTML = `<div class="diamond-mark"></div><span>${String(index + 1).padStart(2, '0')} &nbsp;&nbsp;&nbsp; ${track.title}</span>`;
                li.addEventListener('click', () => playTrack(index));
                listContainer.appendChild(li);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= playlistData.length) return;
            currentPlayingIndex = index;
            player.loadVideoById(playlistData[index].videoId);
            document.getElementById('current-track-name').textContent = playlistData[index].title;
            renderPlaylist();
        }

        function playNextTrack() { playTrack(currentPlayingIndex + 1 >= playlistData.length ? 0 : currentPlayingIndex + 1); }
        function playPrevTrack() { playTrack(currentPlayingIndex - 1 < 0 ? playlistData.length - 1 : currentPlayingIndex - 1); }

        document.getElementById('btn-play-pause').addEventListener('click', () => {
            if(currentPlayingIndex === -1 && playlistData.length > 0) playTrack(0);
            else if (player && player.getPlayerState) isPlaying ? player.pauseVideo() : player.playVideo();
        });
        document.getElementById('btn-next').addEventListener('click', playNextTrack);
        document.getElementById('btn-prev').addEventListener('click', playPrevTrack);

        const root = document.documentElement;
        document.getElementById('config-color-1').addEventListener('input', e => root.style.setProperty('--color-1', e.target.value));
        document.getElementById('config-color-2').addEventListener('input', e => root.style.setProperty('--color-2', e.target.value));
        
        // 인라인 텍스트 편집 감지 및 로컬 저장소 동기화 대비
        const pairNameDisplay = document.getElementById('pair-name-display');
        pairNameDisplay.addEventListener('blur', () => {
            if(pairNameDisplay.textContent.trim() === '') pairNameDisplay.textContent = 'ETERNAL_BOND';
        });

        document.getElementById('config-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    base64ImgData = event.target.result;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('save-local-btn').addEventListener('click', () => {
            localStorage.setItem('pair_music_box_v6', JSON.stringify({
                pairName: pairNameDisplay.textContent,
                color1: document.getElementById('config-color-1').value,
                color2: document.getElementById('config-color-2').value,
                playlist: playlistData,
                imageData: base64ImgData
            }));
            alert("SYSTEM: 오타쿠 서사 보존 완료.");
        });

        window.onload = () => {
            const saved = localStorage.getItem('pair_music_box_v6');
            if(saved) {
                const data = JSON.parse(saved);
                if(data.pairName) pairNameDisplay.textContent = data.pairName;
                if(data.color1) { document.getElementById('config-color-1').value = data.color1; root.style.setProperty('--color-1', data.color1); }
                if(data.color2) { document.getElementById('config-color-2').value = data.color2; root.style.setProperty('--color-2', data.color2); }
                if(data.imageData) {
                    base64ImgData = data.imageData;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                }
                if(data.playlist) { playlistData = data.playlist; renderPlaylist(); }
            }
        };

        document.getElementById('export-png-btn').addEventListener('click', () => {
            html2canvas(document.getElementById('export-target'), {
                useCORS: true, backgroundColor: '#000000', scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${pairNameDisplay.textContent}_music_box.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
