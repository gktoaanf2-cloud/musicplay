<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pair Music Box - The Absolute Universe</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style id="core-styles">
        /* =========================================
           1. CORE DESIGN SYSTEM 
           ========================================= */
        :root {
            --color-1: #ffffff;
            --color-2: #cccccc;
            --color-3: #888888;
            --color-4: #030305;
            --font-pair: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, input, button, textarea {
            background-color: var(--color-4); 
            color: var(--color-1); 
            font-family: var(--font-pair); margin: 0; padding: 0; font-weight: 300;
        }
        
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; transition: background-color 0.5s ease; position: relative;
        }

        body.capturing { justify-content: flex-start !important; align-items: flex-start !important; }
        .capturing #export-target { transform: none !important; position: absolute !important; top: 0 !important; left: 0 !important; margin: 0 !important; background-color: var(--color-4) !important; }

        /* =========================================
           2. VISIBLE NEBULA & STARDUST (보스 픽: 눈에 띄게 아름다운 성운 광원)
           ========================================= */
        .nebula-container { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .nebula-light {
            position: absolute; border-radius: 50%; filter: blur(90px); mix-blend-mode: screen;
            animation: cosmic-drift 20s ease-in-out infinite alternate;
        }
        /* 보이지 않던 0.04 오퍼시티를 과감히 0.15~0.20으로 펌핑! 확실하게 영롱합니다. */
        .light-1 { top: 15%; left: 15%; width: 450px; height: 450px; background: var(--color-1); opacity: 0.15; animation-duration: 22s; }
        .light-2 { bottom: 10%; right: 10%; width: 550px; height: 550px; background: var(--color-2); opacity: 0.18; animation-duration: 28s; animation-delay: -5s; }
        .light-3 { top: 50%; left: 45%; width: 350px; height: 350px; background: var(--color-3); opacity: 0.20; animation-duration: 18s; animation-delay: -10s; }

        @keyframes cosmic-drift {
            0% { transform: translate(0, 0) scale(0.9); }
            100% { transform: translate(60px, -40px) scale(1.1); }
        }

        .stardust-container { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
        .stardust-wrapper { position: absolute; inset: -50%; width: 200%; height: 200%; }
        .stardust-layer { position: absolute; inset: 0; background-repeat: repeat; }
        
        .layer-1 {
            background-image: radial-gradient(1.5px 1.5px at 40px 60px, rgba(255,255,255,1), transparent), radial-gradient(1px 1px at 240px 150px, rgba(255,255,255,0.6), transparent), radial-gradient(2px 2px at 500px 350px, rgba(255,255,255,0.9), transparent);
            background-size: 800px 800px; animation: stardust-fall 80s linear infinite, stardust-twinkle 5s ease-in-out infinite alternate; opacity: 0.6;
        }
        .layer-2 {
            background-image: radial-gradient(1px 1px at 120px 80px, rgba(255,255,255,0.7), transparent), radial-gradient(1.5px 1.5px at 400px 250px, rgba(255,255,255,0.5), transparent);
            background-size: 600px 600px; animation: stardust-fall 100s linear infinite, stardust-twinkle 7s ease-in-out infinite alternate-reverse; opacity: 0.5;
        }
        @keyframes stardust-fall { 0% { transform: translateY(0); } 100% { transform: translateY(400px); } }
        @keyframes stardust-twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; filter: drop-shadow(0 0 12px #fff); } }

        /* =========================================
           3. MAIN LAYOUT & ULTRA-COMPACT TOOLBAR
           ========================================= */
        #export-target { width: 1400px; height: 850px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; padding: 50px 60px; background-color: transparent; z-index: 10; }
        .main-content { display: flex; flex: 1; gap: 70px; align-items: center; position: relative; z-index: 10; }

        .floating-tools { 
            position: absolute; top: 40px; right: 50px; display: flex; gap: 12px; align-items: center; z-index: 100;
            background: transparent; padding: 0; border: none; box-shadow: none; backdrop-filter: none;
        }
        .tool-sep { color: rgba(255,255,255,0.12); font-size: 9px; font-weight: 300; pointer-events: none; }
        .text-btn { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 11px; cursor: pointer; transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); font-family: inherit; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; padding: 2px 4px; }
        .text-btn:hover { color: var(--color-1); text-shadow: 0 0 10px var(--color-1); }
        .text-btn.reset-btn:hover { color: #ff3366; text-shadow: 0 0 10px #ff3366; }

        .color-picker-wrapper { position: relative; width: 12px; height: 12px; border-radius: 2px; overflow: hidden; cursor: pointer; transition: 0.3s; border: none; transform: rotate(45deg); }
        .color-picker-wrapper:hover { transform: rotate(45deg) scale(1.3); box-shadow: 0 0 10px var(--color-1); z-index: 10; }
        .color-picker-wrapper input[type="color"] { position: absolute; top: -15px; left: -15px; width: 45px; height: 45px; cursor: pointer; border: none; transform: rotate(-45deg); }
        .font-controls, .color-controls, .data-controls { display: flex; gap: 10px; align-items: center;}

        /* =========================================
           4. LP & DUAL IMAGE LAYERS
           ========================================= */
        .lp-wrapper { flex: 0 0 650px; display: flex; justify-content: center; align-items: center; position: relative; }
        .sacred-geometry { position: absolute; inset: -50px; background-position: center; background-repeat: no-repeat; pointer-events: none; z-index: 0; animation: spin-reverse 60s linear infinite; background-image: url("data:image/svg+xml,%3Csvg width='750' height='750' viewBox='0 0 750 750' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23ffffff' stroke-width='1' fill='none' stroke-opacity='0.04'%3E%3Ccircle cx='375' cy='375' r='350'/%3E%3Ccircle cx='375' cy='375' r='280'/%3E%3Ccircle cx='375' cy='375' r='180'/%3E%3Cpath d='M375 25v700M25 375h700M127 127l496 496M127 623l496-496'/%3E%3C/g%3E%3C/svg%3E"); }

        .lp-soundwaves { position: absolute; width: 650px; height: 650px; border-radius: 50%; pointer-events: none; z-index: 0; }
        .wave-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--color-1); animation: pulse-wave 4s ease-out infinite; animation-play-state: paused; opacity: 0; }
        .wave-ring:nth-child(2) { animation-delay: 1.3s; border-color: var(--color-2); }
        .wave-ring:nth-child(3) { animation-delay: 2.6s; border-color: var(--color-3); }
        @keyframes pulse-wave { 0% { transform: scale(1); opacity: 0.15; } 100% { transform: scale(1.5); opacity: 0; } }

        .lp-spin-master { width: 660px; height: 660px; display: flex; justify-content: center; align-items: center; position: relative; animation: master-spin 10s linear infinite; animation-play-state: paused; z-index: 1; }
        @keyframes master-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .lp-halo-ring { position: absolute; inset: 5px; border-radius: 50%; background: conic-gradient(from 0deg, var(--color-1), transparent 20%, var(--color-2) 40%, transparent 60%, var(--color-3) 80%, var(--color-1)); opacity: 0.3; filter: blur(10px); z-index: 0; transition: opacity 0.5s; }
        .lp-record { width: 650px; height: 650px; border-radius: 50%; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); position: relative; box-shadow: inset 0 0 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 1; }
        .lp-grooves { position: absolute; inset: 0; border-radius: 50%; background-image: repeating-radial-gradient(transparent 0, transparent 10px, rgba(255,255,255,0.03) 11px, rgba(255,255,255,0.05) 12px, transparent 13px); pointer-events: none; z-index: 2; }
        .lp-internal-glow { position: absolute; inset: -20px; border-radius: 50%; background: conic-gradient(from 90deg, transparent 0%, rgba(255,255,255,0.1) 25%, transparent 50%, rgba(255,255,255,0.1) 75%, transparent 100%); opacity: 0.5; pointer-events: none; z-index: 3; filter: blur(4px); mix-blend-mode: screen; }

        .lp-center-image-container {
            width: 290px; height: 290px; border-radius: 50%; position: relative; z-index: 10;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 0 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.9);
            cursor: pointer; overflow: hidden;
        }
        .lp-center-bg {
            position: absolute; inset: 0; border-radius: 50%; background-size: cover; background-position: center;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.25, 1); will-change: opacity;
            background-color: #000000; background-image: none; pointer-events: none;
        }
        #center-img-overlay { opacity: 0; }

        /* =========================================
           5. PLAYLIST (SHOOTING STAR TRAIL)
           ========================================= */
        .playlist-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; height: 100%; position: relative; }
        .sub-title { font-size: 13px; color: var(--color-1); opacity: 0.5; text-transform: uppercase; margin-bottom: 3px; outline: none; font-weight: 500; transition: 0.3s; letter-spacing: 0.4em; }
        .sub-title:focus { color: var(--color-1); opacity: 1; text-shadow: 0 0 10px var(--color-1); }
        .pair-name { font-family: var(--font-pair); font-size: 68px; font-weight: 700; background: linear-gradient(135deg, var(--color-1), var(--color-2), var(--color-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; outline: none; display: inline-block; transition: font-size 0.2s; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); letter-spacing: -0.05em; }

        .playlist-container { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; scroll-behavior: smooth; }
        .playlist-container::-webkit-scrollbar { display: none; }
        
        .track-item { display: flex; align-items: center; padding: 14px 20px; background: transparent; cursor: pointer; font-size: 14px; color: var(--color-1); opacity: 0.45; position: relative; font-weight: 300; justify-content: space-between; letter-spacing: -0.05em; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); transform-origin: center; }
        .track-item.anim-fade { opacity: 0; transform: translateY(-10px); }
        .track-info { display: flex; align-items: center; flex: 1; }
        .track-title { display: inline-block; transform: scaleX(0.95); transform-origin: left center; white-space: nowrap; transition: 0.3s; }

        .track-item::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 1px; background: var(--color-1); opacity: 0.15; transition: width 0.7s cubic-bezier(0.19, 1, 0.22, 1); }
        .track-item:hover { opacity: 1; color: var(--color-1); }
        .track-item:hover::after { width: 100%; opacity: 0.5; }

        .track-item.playing { opacity: 1; color: var(--color-1); font-weight: 500; text-shadow: 0 0 15px var(--color-1); }
        
        /* 극도로 얇은 슈팅스타 빛의 꼬리 스캔 연출 */
        .track-item.playing::after { 
            content: ''; position: absolute; bottom: 0; left: 0; width: 100% !important; height: 1px;
            background: linear-gradient(90deg, var(--color-1) 0%, transparent 100%);
            transform: scaleY(0.3); transform-origin: left bottom;
            -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 15%, black 45%, transparent 100%);
            -webkit-mask-size: 200% 100%; -webkit-mask-repeat: no-repeat;
            opacity: 0.7; animation: shooting-star 6s ease-in-out infinite; 
        }
        @keyframes shooting-star { 
            0% { -webkit-mask-position: -200% 0; opacity: 0; } 
            25% { opacity: 1; }
            75% { opacity: 0.5; }
            100% { -webkit-mask-position: 200% 0; opacity: 0; } 
        }

        .diamond-mark { width: 4px; height: 4px; background: var(--color-1); transform: rotate(45deg); margin-right: 20px; opacity: 0.2; transition: 0.5s; flex-shrink: 0; position: relative;}
        .track-item:hover .diamond-mark { opacity: 1; box-shadow: 0 0 8px var(--color-1); }
        .track-item.playing .diamond-mark { opacity: 1 !important; box-shadow: 0 0 8px var(--color-1); }
        .track-item.playing .diamond-mark::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 14px; height: 14px;
            border: 0.5px solid var(--color-1); border-radius: 50%;
            animation: list-ripple 2s cubic-bezier(0.16, 1, 0.3, 1) infinite; opacity: 0; pointer-events: none;
        }
        @keyframes list-ripple { 0% { transform: translate(-50%, -50%) scale(0.5) rotate(-45deg); opacity: 0.6; } 100% { transform: translate(-50%, -50%) scale(2.2) rotate(-45deg); opacity: 0; } }

        .track-actions { display: flex; gap: 6px; opacity: 0; transition: 0.3s; transform: translateX(10px); align-items: center;}
        .track-item:hover .track-actions { opacity: 1; transform: translateX(0); }
        .action-btn { background: transparent; border: none; color: var(--color-1); opacity: 0.4; font-size: 10px; cursor: pointer; padding: 4px; transition: 0.3s; font-family: inherit; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { opacity: 1; transform: scale(1.15); }
        .action-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; }
        .action-btn.del-btn:hover { color: #ff3366; }

        /* =========================================
           6. SOUNDBAR
           ========================================= */
        .player-bar { width: 100%; height: 60px; display: flex; align-items: center; margin-top: 80px; position: relative; z-index: 10; gap: 20px;}
        .controls { display: flex; align-items: center; gap: 25px; }
        .control-btn { background: none; border: none; cursor: pointer; padding: 0; opacity: 0.4; transition: 0.4s; display: flex; align-items: center; justify-content: center;}
        .control-btn:hover { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 10px var(--color-1)); }
        .control-btn.active { opacity: 1; filter: drop-shadow(0 0 10px var(--color-1)); }
        .control-btn.active svg { fill: var(--color-1); }
        .control-btn svg { width: 18px; height: 18px; fill: var(--color-1); transition: fill 0.3s;}
        .play-pause-btn svg { width: 32px; height: 32px; fill: url(#grad-play); }

        .progress-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
        .track-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--color-1); opacity: 0.5; letter-spacing: 2px; }
        #current-track-name { font-weight: 500; font-size: 13px; color: var(--color-1); letter-spacing: -0.05em; transform: scaleX(0.95); transform-origin: left center;}

        .progress-hitbox { width: 100%; height: 24px; cursor: pointer; display: flex; align-items: center; position: relative; }
        .progress-bar-container { width: 100%; height: 1px; background: rgba(255,255,255,0.1); position: relative; pointer-events: none; width: 100%; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--color-1), var(--color-3)); box-shadow: 0 0 10px var(--color-1); position: relative; will-change: width;}
        .progress-fill::after { content: ''; position: absolute; right: -3px; top: 50%; width: 6px; height: 6px; background: var(--color-1); transform: translateY(-50%) rotate(45deg); box-shadow: 0 0 10px var(--color-1); }

        .volume-wrapper { display: flex; align-items: center; gap: 10px; margin-left: 15px; opacity: 0.5; transition: 0.3s; }
        .volume-wrapper:hover { opacity: 1; }
        .volume-wrapper svg { width: 14px; height: 14px; fill: var(--color-1); }
        .volume-slider { -webkit-appearance: none; width: 60px; height: 1px; background: rgba(255,255,255,0.1); outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 6px; height: 6px; background: var(--color-1); transform: rotate(45deg); }

        .add-form { display: flex; gap: 15px; align-items: center; margin-left: auto;}
        .add-form input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--color-1); padding: 4px 0; font-size: 12px; width: 110px; outline: none; transition: 0.4s; letter-spacing: -0.05em;}
        .add-form input:focus { border-bottom-color: var(--color-1); box-shadow: 0 10px 10px -10px var(--color-1); }
    </style>
</head>
<body>
    <svg width="0" height="0">
        <defs>
            <linearGradient id="grad-play" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--color-1)" />
                <stop offset="50%" style="stop-color:var(--color-2)" />
                <stop offset="100%" style="stop-color:var(--color-3)" />
            </linearGradient>
        </defs>
    </svg>

    <div class="nebula-container">
        <div class="nebula-light light-1"></div>
        <div class="nebula-light light-2"></div>
        <div class="nebula-light light-3"></div>
    </div>
    
    <div class="stardust-container" id="bg-stardust">
        <div class="stardust-wrapper" style="transform: rotate(0deg);"><div class="stardust-layer layer-1"></div></div>
        <div class="stardust-wrapper" style="transform: rotate(15deg);"><div class="stardust-layer layer-2"></div></div>
    </div>

    <div id="guide-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; opacity:0; transition:0.3s; pointer-events:none;" data-html2canvas-ignore="true">
        <div style="background: linear-gradient(135deg, rgba(15, 15, 20, 0.85) 0%, rgba(5, 5, 10, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 40px; width: 500px; position: relative; clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 30px 100%, 0 calc(100% - 30px)); text-align: left;">
            <button onclick="document.getElementById('guide-modal').style.opacity='0'; setTimeout(()=>document.getElementById('guide-modal').style.display='none',300);" style="position: absolute; top: 25px; right: 25px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; padding: 5px 10px; font-family: 'Courier New', monospace;">[CLOSE]</button>
            <h2 style="font-size: 18px; letter-spacing: 4px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 15px; margin:0 0 25px 0;">SYSTEM_GUIDE // ABYSS</h2>
            <ol style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 20px; font-size: 13px; opacity: 0.85; line-height: 1.6;">
                <li>01. 곡마다 개별 이미지를 매칭하여 서사의 질감을 전환하세요.</li>
                <li>02. 전체 텍스트 레이아웃이 지정하신 테마색 1번에 유기적으로 연동됩니다.</li>
                <li>03. SHARE 버튼을 통해 앤오님께 헌정할 완전한 독립형 웹을 추출합니다.</li>
            </ol>
        </div>
    </div>

    <div id="export-target">
        <div class="floating-tools" id="editor-tools" data-html2canvas-ignore="true">
            <button class="text-btn" onclick="document.getElementById('guide-modal').style.display='flex'; setTimeout(()=>document.getElementById('guide-modal').style.opacity='1',10);">GUIDE</button>
            <span class="tool-sep">|</span>
            <div class="font-controls">
                <button class="text-btn" id="font-size-down">A-</button>
                <button class="text-btn" id="font-size-up">A+</button>
                <button class="text-btn" id="font-toggle-btn">FONT</button>
            </div>
            <span class="tool-sep">|</span>
            <div class="color-controls">
                <div class="color-picker-wrapper"><input type="color" id="config-color-1" value="#ffffff"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-2" value="#cccccc"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-3" value="#888888"></div>
                <div class="color-picker-wrapper"><input type="color" id="config-color-4" value="#030305"></div>
            </div>
            <span class="tool-sep">|</span>
            <div class="data-controls">
                <button class="text-btn" id="export-json-btn">OUT</button>
                <button class="text-btn" id="import-json-btn">IN</button>
                <button class="text-btn reset-btn" id="reset-btn">RESET</button>
            </div>
            <span class="tool-sep">|</span>
            <button class="text-btn" id="export-html-btn" style="color: var(--color-3);">SHARE</button>
        </div>

        <div class="main-content">
            <div class="lp-wrapper">
                <div class="sacred-geometry"></div>
                <div class="lp-soundwaves" id="soundwaves">
                    <div class="wave-ring"></div><div class="wave-ring"></div><div class="wave-ring"></div>
                </div>
                <div class="lp-spin-master" id="lp-master">
                    <div class="lp-halo-ring" id="halo-ring"></div>
                    <div class="lp-record">
                        <div class="lp-grooves"></div><div class="lp-internal-glow"></div>
                        <div class="lp-center-image-container" id="center-img-container" onclick="document.getElementById('config-file').click()">
                            <div class="lp-center-bg" id="center-img-base"></div>
                            <div class="lp-center-bg" id="center-img-overlay"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="playlist-wrapper">
                <div class="sub-title" id="sub-title-display" contenteditable="true" spellcheck="false">RECORD OF OUR GALAXY</div>
                <div class="pair-name" id="pair-name-display" contenteditable="true" spellcheck="false">COSMIC_BOND</div>
                <ul class="playlist-container" id="playlist"></ul>
            </div>
        </div>

        <div class="player-bar">
            <div class="controls">
                <button class="control-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="control-btn play-pause-btn" id="btn-play-pause">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="control-btn" id="btn-loop"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
            <div class="progress-wrapper">
                <div class="track-meta"><span id="current-track-name">NO TRACK SELECTED</span><span id="time-display">0:00 / 0:00</span></div>
                <div class="progress-hitbox" id="progress-hitbox"><div class="progress-bar-container"><div class="progress-fill" id="progress-fill"></div></div></div>
            </div>
            <div class="volume-wrapper">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100">
            </div>
            <div class="add-form" data-html2canvas-ignore="true"><input type="text" id="yt-url" placeholder="YOUTUBE LINK"><input type="text" id="yt-title" placeholder="TITLE"><button class="text-btn add-btn" id="add-track-btn">ADD</button></div>
        </div>
    </div>

    <input type="file" id="config-file" accept="image/*" style="display: none;">
    <input type="file" id="track-img-file" accept="image/*" style="display: none;">
    <input type="file" id="import-json-file" accept=".json" style="display: none;">
    <div id="youtube-player" style="display:none; position:absolute;"></div>

    <script id="core-logic-script">
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        let player, animationFrameId, isDraggingProgress = false;
        if (!window.playlistData) { window.playlistData = []; }
        let currentPlayingIndex = -1, isPlaying = false, isLooping = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', { height: '0', width: '0', events: { 'onStateChange': onPlayerStateChange, 'onReady': onPlayerReady } });
        }
        function onPlayerReady(event) { if(document.getElementById('volume-slider')) player.setVolume(document.getElementById('volume-slider').value); }
        function formatTime(s) { if(!s) return "0:00"; const m = Math.floor(s/60); const ss = Math.floor(s%60); return m + ":" + (ss<10?"0":"")+ss; }

        function startProgressBar() {
            cancelAnimationFrame(animationFrameId);
            function update() {
                if (player && isPlaying && !isDraggingProgress && player.getCurrentTime) {
                    const current = player.getCurrentTime(); const duration = player.getDuration();
                    if(duration > 0) {
                        document.getElementById('progress-fill').style.width = (current / duration) * 100 + '%';
                        document.getElementById('time-display').textContent = formatTime(current) + " / " + formatTime(duration);
                    }
                }
                animationFrameId = requestAnimationFrame(update);
            }
            update();
        }

        function onPlayerStateChange(event) {
            const lp = document.getElementById('lp-master'), waves = document.querySelectorAll('.wave-ring'), iPlay = document.getElementById('icon-play'), iPause = document.getElementById('icon-pause');
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true; lp.style.animationPlayState = 'running';
                waves.forEach(w => w.style.animationPlayState = 'running');
                iPlay.style.display = 'none'; iPause.style.display = 'block';
                startProgressBar();
            } else {
                isPlaying = false; lp.style.animationPlayState = 'paused';
                waves.forEach(w => w.style.animationPlayState = 'paused');
                iPlay.style.display = 'block'; iPause.style.display = 'none';
                cancelAnimationFrame(animationFrameId);
            }
            if (event.data === YT.PlayerState.ENDED) { if(isLooping) { player.seekTo(0); player.playVideo(); } else { playNextTrack(); } }
        }

        function changeLPImage(src) {
            const base = document.getElementById('center-img-base'), over = document.getElementById('center-img-overlay');
            if(!base || !over) return;
            over.style.backgroundImage = src ? "url('" + src + "')" : "none"; over.style.opacity = '1';
            setTimeout(() => { base.style.backgroundImage = src ? "url('" + src + "')" : "none"; over.style.opacity = '0'; }, 850);
        }

        function playTrack(idx) {
            if (idx < 0 || idx >= window.playlistData.length) return;
            currentPlayingIndex = idx; const track = window.playlistData[idx];
            player.loadVideoById(track.videoId);
            document.getElementById('current-track-name').textContent = track.title;
            const img = track.image ? track.image : (window.base64ImgData || "");
            changeLPImage(img);
            document.querySelectorAll('.track-item').forEach((item, i) => {
                if(i === idx) { item.classList.add('playing'); setTimeout(() => item.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50); }
                else item.classList.remove('playing');
            });
        }

        function playNextTrack() { if(window.playlistData.length) playTrack((currentPlayingIndex + 1) % window.playlistData.length); }
        function playPrevTrack() { if(window.playlistData.length) playTrack((currentPlayingIndex - 1 + window.playlistData.length) % window.playlistData.length); }

        document.getElementById('btn-play-pause').onclick = () => {
            if(currentPlayingIndex === -1 && window.playlistData.length > 0) playTrack(0);
            else if (player && player.getPlayerState) isPlaying ? player.pauseVideo() : player.playVideo();
        };
        document.getElementById('btn-next').onclick = playNextTrack;
        document.getElementById('btn-prev').onclick = playPrevTrack;
        document.getElementById('btn-loop').onclick = (e) => { isLooping = !isLooping; e.currentTarget.classList.toggle('active', isLooping); };

        const hb = document.getElementById('progress-hitbox');
        hb.onmousedown = (e) => { isDraggingProgress = true; moveProgress(e); };
        window.onmousemove = (e) => { if(isDraggingProgress) moveProgress(e); };
        window.onmouseup = (e) => { if(isDraggingProgress) { isDraggingProgress = false; const p = moveProgress(e); if(player && player.getDuration) player.seekTo(player.getDuration() * p, true); } };
        function moveProgress(e) {
            const r = hb.getBoundingClientRect(); let p = (e.clientX - r.left) / r.width;
            p = Math.max(0, Math.min(1, p)); document.getElementById('progress-fill').style.width = (p * 100) + '%'; return p;
        }
    </script>

    <script id="editor-ui-script">
        window.base64ImgData = ""; 
        let currentFontSize = 68, isBodoni = false, editingTrackIndex = -1, uploadingTrackIndex = -1;
        const root = document.documentElement;

        function getSiteData() {
            return {
                pairName: document.getElementById('pair-name-display').textContent,
                subTitle: document.getElementById('sub-title-display').textContent,
                fontSize: currentFontSize, color1: document.getElementById('config-color-1').value,
                color2: document.getElementById('config-color-2').value, color3: document.getElementById('config-color-3').value,
                color4: document.getElementById('config-color-4').value, isBodoni: isBodoni,
                playlist: window.playlistData, imageData: window.base64ImgData
            };
        }
        function autoSave() { try { localStorage.setItem('pair_music_box_v40', JSON.stringify(getSiteData())); } catch(e) {} }

        function renderPlaylistUI() {
            const list = document.getElementById('playlist'); list.innerHTML = '';
            const isViewer = !document.getElementById('editor-tools');
            window.playlistData.forEach((track, i) => {
                const li = document.createElement('li'); li.className = 'track-item anim-fade';
                if (i === currentPlayingIndex) li.classList.add('playing');
                let html = '<div class="track-info"><div class="diamond-mark"></div><span class="track-title">' + String(i + 1).padStart(2, '0') + ' &nbsp;&nbsp;&nbsp; ' + track.title + '</span></div>';
                if(!isViewer) {
                    html += '<div class="track-actions">' +
                        '<button class="action-btn img-btn ' + (track.image?'img-active':'') + '" onclick="event.stopPropagation(); uploadingTrackIndex=' + i + '; document.getElementById(\'track-img-file\').click();"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke-width="1.5"/></svg></button>' +
                        (track.image ? '<button class="action-btn del-btn" onclick="event.stopPropagation(); delete window.playlistData['+i+'].image; renderPlaylistUI(); autoSave();"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" stroke-width="1.5"/><line x1="4" y1="4" x2="20" y2="20" stroke-width="1.5"/></svg></button>' : '') +
                        '<button class="action-btn" onclick="event.stopPropagation(); editTrack(' + i + ')">✎</button>' +
                        '<button class="action-btn" onclick="event.stopPropagation(); moveTrack(' + i + ', -1)">▲</button>' +
                        '<button class="action-btn" onclick="event.stopPropagation(); moveTrack(' + i + ', 1)">▼</button>' +
                        '<button class="action-btn del-btn" onclick="event.stopPropagation(); deleteTrack(' + i + ')">✕</button></div>';
                }
                li.innerHTML = html; li.onclick = () => playTrack(i); list.appendChild(li);
                setTimeout(() => li.classList.remove('anim-fade'), 10);
            });
        }

        function editTrack(idx) {
            editingTrackIndex = idx; document.getElementById('yt-title').value = window.playlistData[idx].title;
            document.getElementById('yt-url').value = "https://youtu.be/" + window.playlistData[idx].videoId;
            const btn = document.getElementById('add-track-btn'); btn.textContent = "UPDATE"; btn.classList.add('updating');
        }
        function moveTrack(idx, dir) {
            const target = idx + dir; if(target < 0 || target >= window.playlistData.length) return;
            const temp = window.playlistData[idx]; window.playlistData[idx] = window.playlistData[target]; window.playlistData[target] = temp;
            renderPlaylistUI(); autoSave();
        }
        function deleteTrack(idx) {
            window.playlistData.splice(idx, 1); if(currentPlayingIndex === idx) { if(player && player.stopVideo) player.stopVideo(); currentPlayingIndex = -1; document.getElementById('current-track-name').textContent = "NO TRACK SELECTED"; document.getElementById('time-display').textContent = "0:00 / 0:00"; document.getElementById('progress-fill').style.width = '0%'; changeLPImage(window.base64ImgData); } else if (currentPlayingIndex > idx) { currentPlayingIndex--; }
            renderPlaylistUI(); autoSave();
        }

        document.getElementById('add-track-btn').onclick = () => {
            const url = document.getElementById('yt-url').value, title = document.getElementById('yt-title').value.trim() || "UNKNOWN";
            const match = url.match(/(?:youtu\.be\/|v=)([^"&?\/\s]{11})/); const id = match ? match[1] : (url.length===11?url:null);
            if(!id) return alert("유효하지 않은 링크");
            if(editingTrackIndex > -1) { window.playlistData[editingTrackIndex].videoId = id; window.playlistData[editingTrackIndex].title = title; editingTrackIndex = -1; const btn = document.getElementById('add-track-btn'); btn.textContent = "ADD"; btn.classList.remove('updating'); }
            else { window.playlistData.push({ videoId: id, title: title }); }
            document.getElementById('yt-url').value = ''; document.getElementById('yt-title').value = ''; renderPlaylistUI(); autoSave();
        };

        ['1', '2', '3', '4'].forEach(n => { document.getElementById('config-color-'+n).oninput = (e) => { root.style.setProperty('--color-'+n, e.target.value); autoSave(); }; });

        document.getElementById('config-file').onchange = (e) => { const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onload = (ev) => { window.base64ImgData = ev.target.result; changeLPImage(ev.target.result); autoSave(); }; r.readAsDataURL(f); } };
        document.getElementById('track-img-file').onchange = (e) => { const f = e.target.files[0]; if(f && uploadingTrackIndex > -1) { const r = new FileReader(); r.onload = (ev) => { window.playlistData[uploadingTrackIndex].image = ev.target.result; if(currentPlayingIndex === uploadingTrackIndex) changeLPImage(ev.target.result); renderPlaylistUI(); autoSave(); }; r.readAsDataURL(f); } };

        document.getElementById('reset-btn').onclick = () => { if(confirm("세계선을 리셋하시겠습니까?")) { localStorage.removeItem('pair_music_box_v40'); location.reload(); } };
        document.getElementById('export-json-btn').onclick = () => { const data = JSON.stringify(getSiteData()); const blob = new Blob([data], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = "Archive_Data.json"; a.click(); };
        document.getElementById('import-json-btn').onclick = () => document.getElementById('import-json-file').click();
        document.getElementById('import-json-file').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { const d = JSON.parse(ev.target.result); 
                document.getElementById('pair-name-display').textContent = d.pairName; document.getElementById('sub-title-display').textContent = d.subTitle;
                ['1','2','3','4'].forEach(n => { document.getElementById('config-color-'+n).value = d['color'+n]; root.style.setProperty('--color-'+n, d['color'+n]); });
                window.playlistData = d.playlist; window.base64ImgData = d.imageData || ""; renderPlaylistUI(); changeLPImage(window.base64ImgData); autoSave();
            }; r.readAsText(f);
        };

        window.onload = () => {
            const s = localStorage.getItem('pair_music_box_v40');
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('pair-name-display').textContent = d.pairName; document.getElementById('sub-title-display').textContent = d.subTitle;
                ['1','2','3','4'].forEach(n => { document.getElementById('config-color-'+n).value = d['color'+n]; root.style.setProperty('--color-'+n, d['color'+n]); });
                window.playlistData = d.playlist; window.base64ImgData = d.imageData || ""; renderPlaylistUI(); changeLPImage(window.base64ImgData);
            } else {
                renderPlaylistUI(); document.getElementById('center-img-base').style.backgroundImage = "none";
            }
        };

        // 완벽하게 분리된 HTML SHARE 추출 팩토리 (버그 차단)
        document.getElementById('export-html-btn').onclick = () => {
            autoSave(); const d = getSiteData();
            let plHtml = '';
            d.playlist.forEach((t, i) => { plHtml += '<li class="track-item"><div class="track-info"><div class="diamond-mark"></div><span class="track-title">' + String(i + 1).padStart(2, '0') + ' &nbsp;&nbsp;&nbsp; ' + t.title + '</span></div></li>'; });

            const styles = document.getElementById('core-styles').innerHTML;
            const logic = document.getElementById('core-logic-script').innerHTML;

            const html = '<!DOCTYPE html>\n<html lang="ko">\n<head>\n<meta charset="UTF-8">\n<title>' + d.pairName + ' - Cosmic Viewer</title>\n' +
                '<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />\n' +
                '<style>\n:root { --color-1: ' + d.color1 + ' !important; --color-2: ' + d.color2 + ' !important; --color-3: ' + d.color3 + ' !important; --color-4: ' + d.color4 + ' !important; }\n' +
                styles + '\n</style>\n</head>\n<body>\n' +
                '<svg width="0" height="0"><defs><linearGradient id="grad-play" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:var(--color-1)" /><stop offset="50%" style="stop-color:var(--color-2)" /><stop offset="100%" style="stop-color:var(--color-3)" /></linearGradient></defs></svg>\n' +
                '<div class="nebula-container"><div class="nebula-light light-1"></div><div class="nebula-light light-2"></div><div class="nebula-light light-3"></div></div>\n' +
                '<div class="stardust-container"><div class="stardust-wrapper"><div class="stardust-layer layer-1"></div><div class="stardust-layer layer-2"></div></div></div>\n' +
                '<div id="viewer-wrapper"><div id="export-target" style="padding:0; width:100%; height:100%;">\n' +
                '<div class="main-content"><div class="lp-wrapper"><div class="sacred-geometry"></div><div class="lp-soundwaves"><div class="wave-ring"></div><div class="wave-ring"></div><div class="wave-ring"></div></div>\n' +
                '<div class="lp-spin-master" id="lp-master"><div class="lp-halo-ring"></div><div class="lp-record"><div class="lp-grooves"></div><div class="lp-internal-glow"></div>\n' +
                '<div class="lp-center-image-container" id="center-img-container" style="cursor:default;"><div class="lp-center-bg" id="center-img-base"></div><div class="lp-center-bg" id="center-img-overlay"></div></div>\n' +
                '</div></div></div>\n' +
                '<div class="playlist-wrapper"><div class="sub-title">' + d.subTitle + '</div><div class="pair-name">' + d.pairName + '</div><ul class="playlist-container" id="playlist">' + plHtml + '</ul></div></div>\n' +
                '<div class="player-bar"><div class="controls"><button class="control-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button><button class="control-btn play-pause-btn" id="btn-play-pause"><svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button><button class="control-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button><button class="control-btn" id="btn-loop"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button></div><div class="progress-wrapper"><div class="track-meta"><span id="current-track-name">NO TRACK SELECTED</span><span id="time-display">0:00 / 0:00</span></div><div class="progress-hitbox" id="progress-hitbox"><div class="progress-bar-container"><div class="progress-fill" id="progress-fill"></div></div></div></div><div class="volume-wrapper"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg><input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100"></div></div>\n' +
                '</div></div>\n<div id="youtube-player" style="display:none;"></div>\n' +
                '<scr' + 'ipt>\nwindow.playlistData = ' + JSON.stringify(d.playlist) + ';\nwindow.base64ImgData = "' + d.imageData + '";\n' +
                'function resize() { const w = document.getElementById("viewer-wrapper"); const s = Math.min(window.innerWidth/1400, window.innerHeight/850); w.style.transform = "scale(" + (s>1?1:s) + ")"; }\nwindow.onresize = resize; resize();\n' +
                'document.getElementById("center-img-base").style.backgroundImage = window.base64ImgData ? "url(\'" + window.base64ImgData + "\')" : "none";\n' +
                logic + '\n' +
                'const list = document.getElementById("playlist"); list.innerHTML = ""; window.playlistData.forEach((track, i) => { const li = document.createElement("li"); li.className = "track-item"; if (i === currentPlayingIndex) li.classList.add("playing"); li.innerHTML = "<div class=\\"track-info\\"><div class=\\"diamond-mark\\"></div><span class=\\"track-title\\">" + String(i + 1).padStart(2, "0") + " &nbsp;&nbsp;&nbsp; " + track.title + "</span></div>"; li.onclick = () => playTrack(i); list.appendChild(li); });\n' +
                '</scr' + 'ipt>\n</body>\n</html>';

            const blob = new Blob([html], {type:'text/html'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = d.pairName + "_Viewer.html"; a.click();
        };
    </script>
