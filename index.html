<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pair Music Box v3.0 - High-End UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* =========================================
           1. CORE DESIGN SYSTEM & VARIABLES
           ========================================= */
        :root {
            --theme-color: #00f0ff; /* 무기미도 느낌의 서늘하고 날카로운 사이안 */
            --bg-color: #050508;    /* 심연에 가까운 블랙 */
            --text-glow: 0 0 10px var(--theme-color), 0 0 20px var(--theme-color);
            --line-glow: 0 0 5px var(--theme-color);
            --holo-gradient: conic-gradient(
                from 0deg, 
                rgba(0, 240, 255, 0.1), rgba(255, 0, 255, 0.2), rgba(0, 255, 128, 0.1), 
                rgba(0, 240, 255, 0.3), rgba(255, 0, 255, 0.1), rgba(0, 240, 255, 0.1)
            );
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* 세련된 산세리프 */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* =========================================
           2. MAIN EXPORT WRAPPER (Floating Design)
           ========================================= */
        #export-target {
            width: 1000px;
            padding: 40px;
            background: radial-gradient(circle at center, #11111a 0%, var(--bg-color) 100%);
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* 최상단: LP(좌) + 플레이리스트(우) */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 50px;
        }

        /* =========================================
           3. MASSIVE HOLOGRAM LP (Left)
           ========================================= */
        .lp-section {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .lp-record {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            position: relative;
            /* 리얼한 바이닐 결 + 영롱한 홀로그램 */
            background: 
                repeating-radial-gradient( #0a0a0a 0, #0a0a0a 4px, #1a1a1a 5px, #0a0a0a 6px ),
                var(--holo-gradient);
            background-blend-mode: screen;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15), 
                        inset 0 0 20px rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 7s linear infinite;
            animation-play-state: paused;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 빛 반사 스파클링 효과 (가짜 빛 반사) */
        .lp-record::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.1) 100%);
            pointer-events: none;
        }

        .lp-center-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-image: url('https://via.placeholder.com/140?text=PAIR'); 
            background-size: cover;
            background-position: center;
            border: 3px solid var(--theme-color);
            z-index: 10;
            box-shadow: 0 0 20px var(--theme-color), inset 0 0 10px #000;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* =========================================
           4. SLEEK PLAYLIST (Right)
           ========================================= */
        .playlist-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .pair-name {
            font-size: 38px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-shadow: var(--text-glow);
            position: relative;
        }

        /* 사이버펑크 엣지 라인 */
        .pair-name::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--theme-color);
            margin-top: 10px;
            box-shadow: var(--line-glow);
        }

        .playlist-container {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-container::-webkit-scrollbar { width: 4px; }
        .playlist-container::-webkit-scrollbar-thumb { background: var(--theme-color); }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid transparent;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: #aaa;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-left: 2px solid var(--theme-color);
            color: #fff;
            transform: translateX(5px);
        }

        .track-item.playing {
            color: #fff;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.15) 0%, transparent 100%);
            border-left: 4px solid var(--theme-color);
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
        }

        /* =========================================
           5. SOUND PLAYER BAR (Bottom)
           ========================================= */
        .soundbar-wrapper {
            width: 100%;
            height: 60px;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .now-playing-info {
            font-size: 13px;
            color: var(--theme-color);
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 5px var(--theme-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 시각적 이퀄라이저 애니메이션 */
        .equalizer {
            display: flex;
            gap: 3px;
            height: 20px;
            align-items: flex-end;
        }
        .eq-bar {
            width: 4px;
            background: var(--theme-color);
            box-shadow: var(--line-glow);
            animation: eq-bounce 0.8s infinite alternate ease-in-out;
            animation-play-state: paused;
        }
        .eq-bar:nth-child(1) { height: 30%; animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { height: 80%; animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { height: 50%; animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { height: 100%; animation-delay: 0.5s; }
        .eq-bar:nth-child(5) { height: 40%; animation-delay: 0.4s; }

        @keyframes eq-bounce {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }

        /* 플레이리스트 추가 폼 (사운드바 우측에 매끄럽게 배치) */
        .add-form {
            display: flex;
            gap: 10px;
        }
        .add-form input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 5px;
            font-size: 12px;
            outline: none;
            transition: 0.3s;
        }
        .add-form input:focus { border-bottom: 1px solid var(--theme-color); }
        .add-form button {
            background: transparent;
            border: 1px solid var(--theme-color);
            color: var(--theme-color);
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .add-form button:hover {
            background: var(--theme-color);
            color: #000;
            box-shadow: var(--line-glow);
        }

        /* =========================================
           6. CONFIG PANEL (Outside export target)
           ========================================= */
        .config-panel {
            width: 1000px;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 20px;
            align-items: center;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .config-group { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #888; }
        .config-group input[type="text"] {
            background: #000; border: 1px solid #333; color: #fff; padding: 6px 10px;
        }
        .config-group input[type="color"] { border: none; background: transparent; cursor: pointer; width: 30px; height: 30px; }
        .btn-action {
            background: #111; border: 1px solid #444; color: #fff; padding: 8px 15px; cursor: pointer; transition: 0.2s;
        }
        .btn-action:hover { border-color: var(--theme-color); color: var(--theme-color); }
    </style>
</head>
<body>

    <div id="export-target">
        
        <div class="top-section">
            <div class="lp-section">
                <div class="lp-record" id="lp-disk">
                    <div class="lp-center-image" id="center-img"></div>
                </div>
            </div>

            <div class="playlist-section">
                <div class="pair-name" id="pair-name-display">SYSTEM_OVERRIDE</div>
                <ul class="playlist-container" id="playlist">
                    </ul>
            </div>
        </div>

        <div class="soundbar-wrapper">
            <div class="now-playing-info">
                <div class="equalizer" id="eq-visualizer">
                    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                </div>
                <span id="current-track-name">NO TRACK PLAYING</span>
            </div>
            
            <div class="add-form">
                <input type="text" id="yt-url" placeholder="YouTube Link" style="width: 200px;">
                <input type="text" id="yt-title" placeholder="Track Title" style="width: 150px;">
                <button id="add-track-btn">ADD</button>
            </div>
        </div>

    </div>

    <div class="config-panel">
        <div class="config-group">
            <label>NAME</label>
            <input type="text" id="config-pair-name" placeholder="페어명 입력">
        </div>
        <div class="config-group">
            <label>THEME</label>
            <input type="color" id="config-theme-color" value="#00f0ff">
        </div>
        <div class="config-group">
            <button class="btn-action" onclick="document.getElementById('config-file').click()">IMAGE UPLOAD</button>
            <input type="file" id="config-file" accept="image/*" style="display: none;">
        </div>
        <div style="margin-left: auto; display: flex; gap: 10px;">
            <button class="btn-action" id="save-local-btn">SAVE DATA</button>
            <button class="btn-action" id="export-png-btn" style="border-color: var(--theme-color); color: var(--theme-color);">EXPORT PNG</button>
        </div>
    </div>

    <div id="youtube-player" style="display:none; position:absolute;"></div>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        let playlistData = [];
        let currentPlayingIndex = -1;
        let base64ImgData = ""; 

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            const lpDisk = document.getElementById('lp-disk');
            const eqBars = document.querySelectorAll('.eq-bar');
            
            if (event.data === YT.PlayerState.PLAYING) {
                lpDisk.style.animationPlayState = 'running';
                eqBars.forEach(bar => bar.style.animationPlayState = 'running');
            } else {
                lpDisk.style.animationPlayState = 'paused';
                eqBars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
            if (event.data === YT.PlayerState.ENDED) playNextTrack();
        }

        function extractVideoID(url) {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regExp);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        document.getElementById('add-track-btn').addEventListener('click', () => {
            const urlInput = document.getElementById('yt-url');
            const titleInput = document.getElementById('yt-title');
            const videoId = extractVideoID(urlInput.value);
            let title = titleInput.value.trim() || "UNKNOWN TRACK";
            if (!videoId) return alert("유효한 유튜브 링크가 아닙니다!");

            playlistData.push({ videoId, title });
            urlInput.value = ''; titleInput.value = '';
            renderPlaylist();
        });

        function renderPlaylist() {
            const listContainer = document.getElementById('playlist');
            listContainer.innerHTML = '';
            playlistData.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                if (index === currentPlayingIndex) li.classList.add('playing');
                li.innerHTML = `0${index + 1} // ${track.title}`;
                li.addEventListener('click', () => playTrack(index));
                listContainer.appendChild(li);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= playlistData.length) return;
            currentPlayingIndex = index;
            player.loadVideoById(playlistData[index].videoId);
            document.getElementById('current-track-name').textContent = playlistData[index].title;
            renderPlaylist();
        }

        function playNextTrack() {
            if (playlistData.length === 0) return;
            let nextIndex = currentPlayingIndex + 1;
            if (nextIndex >= playlistData.length) nextIndex = 0;
            playTrack(nextIndex);
        }

        // 실시간 동기화 및 로컬 스토리지
        document.getElementById('config-pair-name').addEventListener('input', (e) => {
            document.getElementById('pair-name-display').textContent = e.target.value.trim() || "SYSTEM_OVERRIDE";
        });
        document.getElementById('config-theme-color').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--theme-color', e.target.value);
        });
        document.getElementById('config-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64ImgData = event.target.result;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('save-local-btn').addEventListener('click', () => {
            localStorage.setItem('pair_music_box_v3', JSON.stringify({
                pairName: document.getElementById('config-pair-name').value,
                themeColor: document.getElementById('config-theme-color').value,
                playlist: playlistData,
                imageData: base64ImgData
            }));
            alert("SYSTEM: Data saved to local storage.");
        });

        window.onload = () => {
            const saved = localStorage.getItem('pair_music_box_v3');
            if(saved) {
                const data = JSON.parse(saved);
                if(data.pairName) {
                    document.getElementById('config-pair-name').value = data.pairName;
                    document.getElementById('pair-name-display').textContent = data.pairName;
                }
                if(data.themeColor) {
                    document.getElementById('config-theme-color').value = data.themeColor;
                    document.documentElement.style.setProperty('--theme-color', data.themeColor);
                }
                if(data.imageData) {
                    base64ImgData = data.imageData;
                    document.getElementById('center-img').style.backgroundImage = `url('${base64ImgData}')`;
                }
                if(data.playlist) {
                    playlistData = data.playlist;
                    renderPlaylist();
                }
            }
        };

        document.getElementById('export-png-btn').addEventListener('click', () => {
            html2canvas(document.getElementById('export-target'), {
                useCORS: true, backgroundColor: '#050508', scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `music_box.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
