<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair Music Box — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --c1: #ffffff; --c2: #cccccc; --c3: #888888; --c4: #030305; }
body { background: var(--c4); color: var(--c1); font-family: 'Pretendard', sans-serif; min-height: 100vh; position: relative; overflow-x: hidden; }

.stardust { position: fixed; inset: -50%; width: 200%; height: 200%; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,1), transparent),
    radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 60% 20%, rgba(255,255,255,1), transparent),
    radial-gradient(1.5px 1.5px at 80% 80%, rgba(255,255,255,0.7), transparent);
  background-size: 450px 450px;
  animation: dust-drift 80s linear infinite, dust-twinkle 5s ease-in-out infinite alternate;
}
@keyframes dust-drift { 0%{transform:translateY(0)} 100%{transform:translateY(300px)} }
@keyframes dust-twinkle { 0%{opacity:.15} 100%{opacity:.9} }

.ambient { position: fixed; border-radius: 50%; filter: blur(120px); mix-blend-mode: screen; pointer-events: none; z-index: 0; animation: pulse 20s ease-in-out infinite alternate; }
.amb-1 { top: 15%; left: 20%; width: 300px; height: 300px; background: var(--c1); opacity: 0.04; }
.amb-2 { bottom: 15%; right: 15%; width: 400px; height: 400px; background: var(--c2); opacity: 0.03; animation-delay: -7s; }
@keyframes pulse { 0%{transform:scale(.9);opacity:.02} 100%{transform:translate(30px,20px) scale(1.1);opacity:.06} }

.container { position: relative; z-index: 10; max-width: 860px; margin: 0 auto; padding: 60px 28px 80px; }

/* 상단 바 */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 50px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.user-info { display: flex; align-items: center; gap: 14px; }
.user-diamond { width: 8px; height: 8px; background: var(--c1); transform: rotate(45deg); box-shadow: 0 0 12px rgba(255,255,255,0.3); }
.user-nick { font-size: 15px; font-weight: 400; letter-spacing: -0.02em; }
.user-nick b { font-weight: 600; }
.topbar-actions { display: flex; gap: 16px; align-items: center; }
.top-btn { background: none; border: none; color: var(--c3); font-family: 'Chakra Petch', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 3px; cursor: pointer; transition: 0.3s; text-transform: uppercase; padding: 6px 0; }
.top-btn:hover { color: var(--c1); text-shadow: 0 0 10px rgba(255,255,255,0.4); }
.top-btn.logout:hover { color: #ff4466; }

/* 섹션 */
.section { margin-bottom: 50px; }
.section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.section-ix { font-family: 'Chakra Petch', sans-serif; font-size: 10px; color: var(--c1); letter-spacing: 2px; opacity: 0.6; }
.section-title { font-family: 'Chakra Petch', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 4px; color: var(--c3); text-transform: uppercase; }
.section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent); }
.section-dot { width: 5px; height: 5px; background: var(--c3); transform: rotate(45deg); opacity: 0.5; }

/* 플레이리스트 카드 */
.pl-grid { display: flex; flex-direction: column; gap: 8px; }
.pl-card { display: flex; align-items: center; padding: 20px 24px; background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: 0.4s; position: relative; }
.pl-card::before { content: ""; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.2); pointer-events: none; }
.pl-card:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); }
.pl-card:hover .pl-actions { opacity: 1; transform: translateX(0); }

.pl-mark { width: 4px; height: 4px; background: var(--c1); transform: rotate(45deg); opacity: 0.3; margin-right: 20px; flex-shrink: 0; }
.pl-card:hover .pl-mark { opacity: 1; box-shadow: 0 0 8px var(--c1); }

.pl-info { flex: 1; min-width: 0; }
.pl-name { font-size: 16px; font-weight: 500; letter-spacing: -0.03em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-sub { font-size: 11px; color: var(--c3); letter-spacing: 1px; font-family: 'Chakra Petch', sans-serif; }

.pl-meta { font-family: 'Chakra Petch', sans-serif; font-size: 10px; color: var(--c3); letter-spacing: 1px; opacity: 0.6; margin-right: 20px; white-space: nowrap; }

.pl-actions { display: flex; gap: 8px; opacity: 0; transform: translateX(10px); transition: 0.3s; }
.act-btn { background: none; border: none; color: var(--c3); font-family: 'Chakra Petch', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-transform: uppercase; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.1); }
.act-btn:hover { color: var(--c1); border-color: rgba(255,255,255,0.3); }
.act-btn.del:hover { color: #ff4466; border-color: #ff4466; }

/* 새로 만들기 */
.create-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 22px; background: transparent; border: 1px dashed rgba(255,255,255,0.1); color: var(--c3); font-family: 'Chakra Petch', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 4px; cursor: pointer; transition: 0.4s; text-transform: uppercase; margin-top: 12px; }
.create-btn:hover { border-color: var(--c1); color: var(--c1); background: rgba(255,255,255,0.02); }
.create-btn .plus { font-size: 16px; font-weight: 300; }

/* 즐겨찾기 카드 */
.fav-card { display: flex; align-items: center; padding: 16px 24px; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.04); transition: 0.4s; cursor: pointer; }
.fav-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.025); }
.fav-owner { font-family: 'Chakra Petch', sans-serif; font-size: 10px; color: var(--c3); letter-spacing: 2px; margin-right: 16px; white-space: nowrap; }
.fav-card:hover .pl-mark { opacity: 1; box-shadow: 0 0 8px var(--c1); }
.fav-actions { margin-left: auto; }

/* 비어있을 때 */
.empty { text-align: center; padding: 40px 20px; color: var(--c3); font-size: 12px; letter-spacing: 2px; font-family: 'Chakra Petch', sans-serif; opacity: 0.5; }

/* 토스트 알림 */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); color: var(--c1); font-family: 'Chakra Petch', sans-serif; font-size: 11px; letter-spacing: 2px; padding: 14px 28px; opacity: 0; transition: 0.4s; z-index: 999; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="stardust"></div>
<div class="ambient amb-1"></div>
<div class="ambient amb-2"></div>

<div class="container">
    <div class="topbar">
        <div class="user-info">
            <div class="user-diamond"></div>
            <div class="user-nick">Welcome, <b id="nick-display">...</b></div>
        </div>
        <div class="topbar-actions">
            <button class="top-btn" onclick="loadData()">Refresh</button>
            <button class="top-btn logout" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <!-- 내 플레이리스트 -->
    <div class="section">
        <div class="section-head">
            <span class="section-ix">01</span>
            <span class="section-title">My Playlists</span>
            <div class="section-line"></div>
            <div class="section-dot"></div>
        </div>
        <div class="pl-grid" id="my-playlists"></div>
        <button class="create-btn" onclick="createPlaylist()"><span class="plus">+</span> New Playlist</button>
    </div>

    <!-- 즐겨찾기 -->
    <div class="section">
        <div class="section-head">
            <span class="section-ix">02</span>
            <span class="section-title">Favorites</span>
            <div class="section-line"></div>
            <div class="section-dot"></div>
        </div>
        <div class="pl-grid" id="my-favorites"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script>
let currentUser = null;
let currentProfile = null;

// 날짜 포맷
function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    return dt.getFullYear() + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + String(dt.getDate()).padStart(2,'0');
}

// 토스트
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

// 로그아웃
async function doLogout() {
    await _supabase.auth.signOut();
    window.location.href = 'index.html';
}

// 새 플레이리스트 생성
async function createPlaylist() {
    if (!currentUser) return;
    const { data, error } = await _supabase.from('playlists').insert({
        user_id: currentUser.id,
        pair_name: 'NEW PLAYLIST',
        sub_title: 'RECORD OF OUR GALAXY'
    }).select('id').single();

    if (error) { toast('생성 실패: ' + error.message); return; }
    window.location.href = 'editor.html?id=' + data.id;
}

// 플레이리스트 삭제
async function deletePlaylist(id, name) {
    if (!confirm('"' + name + '" 을(를) 삭제하시겠습니까?\n(복원 불가)')) return;
    const { error } = await _supabase.from('playlists').delete().eq('id', id);
    if (error) { toast('삭제 실패'); return; }
    toast('삭제 완료');
    loadData();
}

// 공유 링크 복사
function copyShareLink(id) {
    const url = window.location.origin + window.location.pathname.replace('dashboard.html', '') + 'viewer.html?id=' + id;
    navigator.clipboard.writeText(url).then(() => toast('공유 링크가 복사되었습니다')).catch(() => {
        prompt('아래 링크를 복사하세요:', url);
    });
}

// 즐겨찾기 해제
async function removeFav(favId) {
    await _supabase.from('favorites').delete().eq('id', favId);
    toast('즐겨찾기 해제');
    loadData();
}

// 데이터 로드
async function loadData() {
    if (!currentUser) return;

    // 내 플레이리스트
    const { data: playlists } = await _supabase
        .from('playlists')
        .select('id, pair_name, sub_title, updated_at, created_at')
        .eq('user_id', currentUser.id)
        .order('updated_at', { ascending: false });

    const myPl = document.getElementById('my-playlists');
    if (!playlists || playlists.length === 0) {
        myPl.innerHTML = '<div class="empty">아직 만든 플레이리스트가 없습니다</div>';
    } else {
        myPl.innerHTML = playlists.map(pl => 
            '<div class="pl-card" onclick="window.location.href=\'editor.html?id=' + pl.id + '\'">' +
                '<div class="pl-mark"></div>' +
                '<div class="pl-info"><div class="pl-name">' + escHtml(pl.pair_name) + '</div><div class="pl-sub">' + escHtml(pl.sub_title) + '</div></div>' +
                '<div class="pl-meta">' + fmtDate(pl.updated_at) + '</div>' +
                '<div class="pl-actions">' +
                    '<button class="act-btn" onclick="event.stopPropagation(); copyShareLink(\'' + pl.id + '\')">Share</button>' +
                    '<button class="act-btn del" onclick="event.stopPropagation(); deletePlaylist(\'' + pl.id + '\', \'' + escAttr(pl.pair_name) + '\')">Del</button>' +
                '</div>' +
            '</div>'
        ).join('');
    }

    // 즐겨찾기
    const { data: favs } = await _supabase
        .from('favorites')
        .select('id, playlist_id, playlists(id, pair_name, sub_title, user_id, profiles(nickname))')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

    const myFav = document.getElementById('my-favorites');
    if (!favs || favs.length === 0) {
        myFav.innerHTML = '<div class="empty">즐겨찾기한 플레이리스트가 없습니다</div>';
    } else {
        myFav.innerHTML = favs.map(f => {
            const pl = f.playlists;
            if (!pl) return '';
            const owner = pl.profiles ? pl.profiles.nickname : '?';
            return '<div class="fav-card" onclick="window.location.href=\'viewer.html?id=' + pl.id + '\'">' +
                '<div class="pl-mark"></div>' +
                '<div class="fav-owner">' + escHtml(owner) + '</div>' +
                '<div class="pl-info"><div class="pl-name">' + escHtml(pl.pair_name) + '</div><div class="pl-sub">' + escHtml(pl.sub_title) + '</div></div>' +
                '<div class="fav-actions"><button class="act-btn del" onclick="event.stopPropagation(); removeFav(\'' + f.id + '\')">✕</button></div>' +
            '</div>';
        }).join('');
    }
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escAttr(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// 초기화
async function init() {
    currentUser = await requireAuth();
    if (!currentUser) return;
    currentProfile = await getProfile(currentUser.id);
    document.getElementById('nick-display').textContent = currentProfile ? currentProfile.nickname : '유저';
    loadData();
}

init();
</script>
</body>
</html>
